<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yahoo! 聊天室</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root {
  --yahoo-purple: #720E9E;
  --yahoo-purple-dark: #4A0066;
  --yahoo-purple-light: #9B40C8;
  --yahoo-yellow: #FFD700;
  --bg-dark: #1a0a2e;
  --bg-panel: #12071f;
  --bg-card: #1e0d35;
  --bg-input: #0f0520;
  --border: #3d1a5c;
  --border-bright: #6b35a0;
  --text-primary: #f0e6ff;
  --text-secondary: #b08fd0;
  --text-dim: #7a5a99;
  --online-green: #4AFF91;
  --away-yellow: #FFD700;
  --busy-red: #FF5555;
  --scrollbar-thumb: #4d1f75;
  --msg-mine: #2d0f4a;
  --msg-other: #1a0833;
}
body.light {
  --bg-dark: #f0e6ff;
  --bg-panel: #e8d5ff;
  --bg-card: #f5eeff;
  --bg-input: #ffffff;
  --border: #c9a0e8;
  --border-bright: #9b40c8;
  --text-primary: #2d0a4a;
  --text-secondary: #5a1a8a;
  --text-dim: #8a5aaa;
  --scrollbar-thumb: #9b40c8;
  --msg-mine: #e0c0ff;
  --msg-other: #f0e0ff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}
/* AUTH */
#auth-screen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-dark);
}
.auth-box {
  width: 420px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(114,14,158,0.4);
}
.auth-header {
  background: linear-gradient(135deg, var(--yahoo-purple-dark), var(--yahoo-purple), var(--yahoo-purple-light));
  padding: 28px 32px; text-align: center;
}
.yahoo-logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 28px; color: var(--yahoo-yellow);
  text-shadow: 3px 3px 0px rgba(0,0,0,0.5);
}
.yahoo-logo span { color: #fff; }
.auth-subtitle { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; }
.auth-tabs { display: flex; border-bottom: 1px solid var(--border); }
.auth-tab {
  flex: 1; padding: 14px;
  background: none; border: none; cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 700;
  color: var(--text-dim); transition: all 0.2s;
  border-bottom: 2px solid transparent;
}
.auth-tab.active { color: var(--yahoo-yellow); border-bottom-color: var(--yahoo-yellow); background: rgba(255,215,0,0.05); }
.auth-form { padding: 28px 32px; display: none; }
.auth-form.active { display: block; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
.form-group input, .form-group select {
  width: 100%; padding: 10px 14px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 3px; color: var(--text-primary);
  font-family: 'Noto Sans TC', sans-serif; font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--yahoo-purple-light); }
.btn-yahoo {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--yahoo-purple), var(--yahoo-purple-light));
  border: none; border-radius: 3px;
  color: white; font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.btn-yahoo:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(114,14,158,0.5); }
.auth-error { color: #ff6b6b; font-size: 13px; margin-top: 10px; text-align: center; }
/* APP */
#app { display: none; height: 100vh; flex-direction: column; }
#app.visible { display: flex; }
/* TOPBAR */
.topbar {
  height: 52px; min-height: 52px;
  background: linear-gradient(90deg, var(--yahoo-purple-dark), var(--yahoo-purple), var(--yahoo-purple-light));
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
  border-bottom: 2px solid var(--yahoo-yellow);
  box-shadow: 0 2px 20px rgba(114,14,158,0.5); position: relative; z-index: 10;
}
.topbar-logo { font-family: 'Press Start 2P', monospace; font-size: 16px; color: var(--yahoo-yellow); flex-shrink: 0; }
.topbar-logo span { color: white; font-size: 12px; margin-left: 6px; font-family: 'Noto Sans TC', sans-serif; font-weight: 400; opacity: 0.8; }
.topbar-spacer { flex: 1; }
/* Theme Toggle */
.theme-toggle {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px; padding: 4px 10px; cursor: pointer;
}
.theme-toggle-track {
  width: 36px; height: 18px; background: rgba(0,0,0,0.3);
  border-radius: 9px; position: relative; transition: background 0.3s;
  border: 1px solid rgba(255,255,255,0.2);
}
.theme-toggle-thumb {
  width: 14px; height: 14px; background: #fff;
  border-radius: 50%; position: absolute; top: 1px; left: 1px;
  transition: transform 0.3s; font-size: 9px; line-height: 14px; text-align: center;
}
body.light .theme-toggle-track { background: rgba(255,215,0,0.4); }
body.light .theme-toggle-thumb { transform: translateX(18px); }
.theme-label { font-size: 11px; color: white; font-weight: 700; }
/* Brightness Slider */
.brightness-wrap {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px; padding: 4px 10px;
}
.brightness-wrap span { font-size: 14px; }
#brightness-slider {
  width: 70px; height: 4px; accent-color: var(--yahoo-yellow); cursor: pointer;
}
.topbar-user {
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,0.2); border-radius: 20px;
  padding: 4px 12px 4px 4px; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.15);
}
.topbar-avatar { width: 28px; height: 28px; border-radius: 50%; font-size: 18px; line-height: 28px; text-align: center; }
.topbar-username { font-size: 13px; font-weight: 700; color: white; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--online-green); }
.btn-topbar {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
  border-radius: 3px; padding: 5px 12px;
  color: white; font-size: 12px; cursor: pointer; transition: all 0.2s;
  font-family: 'Noto Sans TC', sans-serif; font-weight: 700;
}
.btn-topbar:hover { background: rgba(255,255,255,0.25); }
/* LAYOUT */
.main-layout { display: flex; flex: 1; overflow: hidden; }
.sidebar-left {
  width: 220px; min-width: 220px;
  background: var(--bg-panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-right {
  width: 190px; min-width: 190px;
  background: var(--bg-panel); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-section-header {
  padding: 10px 14px 6px;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-dim); font-weight: 700;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-add-btn {
  background: none; border: none; color: var(--yahoo-yellow);
  cursor: pointer; font-size: 16px; line-height: 1;
  padding: 0 2px; transition: transform 0.2s;
}
.sidebar-add-btn:hover { transform: scale(1.2); }
.room-list { flex: 1; overflow-y: auto; }
.room-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; cursor: pointer;
  border-left: 3px solid transparent; transition: all 0.15s; font-size: 13px;
}
.room-item:hover { background: rgba(114,14,158,0.2); border-left-color: var(--yahoo-purple-light); }
.room-item.active { background: rgba(114,14,158,0.35); border-left-color: var(--yahoo-yellow); color: var(--yahoo-yellow); }
.user-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.user-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; cursor: pointer; transition: background 0.15s; font-size: 13px;
}
.user-item:hover { background: rgba(114,14,158,0.2); }
.user-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.status-online { background: var(--online-green); }
/* CHAT */
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-card); }
.chat-header {
  padding: 12px 18px; background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.chat-room-name { font-size: 16px; font-weight: 700; color: var(--yahoo-yellow); }
.chat-room-topic { font-size: 12px; color: var(--text-dim); }
.chat-type-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.badge-public { background: rgba(114,14,158,0.4); color: var(--yahoo-purple-light); border: 1px solid var(--yahoo-purple); }
.badge-dm { background: rgba(74,255,145,0.15); color: var(--online-green); border: 1px solid rgba(74,255,145,0.3); }
.messages-container { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 2px; }
.msg-wrap { display: flex; flex-direction: column; }
.msg-wrap.mine { align-items: flex-end; }
.msg-meta { font-size: 10px; color: var(--text-dim); padding: 0 4px; margin-bottom: 2px; display: flex; gap: 6px; }
.msg-wrap.mine .msg-meta { flex-direction: row-reverse; }
.msg-username { color: var(--yahoo-purple-light); font-weight: 700; cursor: pointer; }
.msg-username:hover { color: var(--yahoo-yellow); }
.msg-bubble {
  max-width: 70%; padding: 8px 12px; border-radius: 2px;
  font-size: 14px; line-height: 1.5; word-break: break-word;
  border-left: 3px solid transparent;
}
.msg-bubble.other { background: var(--msg-other); border-left-color: var(--yahoo-purple); }
.msg-bubble.mine { background: var(--msg-mine); border-left-color: var(--yahoo-yellow); }
.msg-bubble.system { background: none; border: none; color: var(--text-dim); font-style: italic; font-size: 12px; text-align: center; width: 100%; max-width: 100%; padding: 4px 0; }
.msg-bubble.sticker { background: none; border: none; font-size: 48px; padding: 4px; }
.msg-bubble.emote { color: var(--yahoo-purple-light); font-style: italic; background: none; border-color: transparent; }
.typing-indicator { padding: 6px 16px; font-size: 12px; color: var(--text-dim); font-style: italic; min-height: 26px; }
/* INPUT */
.input-bar { background: var(--bg-panel); border-top: 1px solid var(--border); }
.input-toolbar { padding: 6px 12px; display: flex; gap: 4px; align-items: center; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.toolbar-btn {
  background: none; border: 1px solid var(--border); border-radius: 2px;
  padding: 3px 7px; color: var(--text-secondary); cursor: pointer;
  font-size: 12px; transition: all 0.15s; font-family: 'Noto Sans TC', sans-serif;
}
.toolbar-btn:hover { background: rgba(114,14,158,0.3); border-color: var(--yahoo-purple-light); color: var(--text-primary); }
.toolbar-btn.active { background: rgba(114,14,158,0.5); border-color: var(--yahoo-yellow); color: var(--yahoo-yellow); }
.color-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); display: inline-block; margin-right: 3px; }
.input-row { display: flex; gap: 10px; padding: 10px 12px; align-items: flex-end; }
#msg-input {
  flex: 1; padding: 9px 12px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 3px; color: var(--text-primary);
  font-family: 'Noto Sans TC', sans-serif; font-size: 14px;
  outline: none; resize: none; max-height: 100px; min-height: 38px; line-height: 1.4;
  transition: border-color 0.2s;
}
#msg-input:focus { border-color: var(--yahoo-purple-light); }
.btn-send {
  padding: 9px 20px;
  background: linear-gradient(135deg, var(--yahoo-purple), var(--yahoo-purple-light));
  border: none; border-radius: 3px; color: white;
  font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.btn-send:hover { box-shadow: 0 2px 12px rgba(114,14,158,0.5); }
/* PANELS */
.float-panel {
  position: fixed; bottom: 110px; left: 240px;
  background: var(--bg-panel); border: 1px solid var(--border-bright);
  border-radius: 4px; padding: 10px; display: none; z-index: 50;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.float-panel.show { display: block; }
.emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; max-height: 200px; overflow-y: auto; width: 300px; }
.emoji-btn { font-size: 22px; padding: 4px; border: none; background: none; cursor: pointer; border-radius: 3px; transition: background 0.15s; line-height: 1; }
.emoji-btn:hover { background: rgba(114,14,158,0.3); }
.sticker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 260px; }
.sticker-btn { font-size: 40px; padding: 8px; border: 1px solid var(--border); background: var(--bg-card); cursor: pointer; border-radius: 4px; transition: all 0.15s; line-height: 1; text-align: center; }
.sticker-btn:hover { border-color: var(--yahoo-yellow); transform: scale(1.05); }
.color-swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
.color-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.color-swatch:hover, .color-swatch.selected { border-color: white; transform: scale(1.2); }
/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 200; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg-panel); border: 1px solid var(--border-bright); border-radius: 4px; width: 480px; box-shadow: 0 0 40px rgba(114,14,158,0.4); overflow: hidden; max-height: 90vh; display: flex; flex-direction: column; }
.modal-header { background: linear-gradient(135deg, var(--yahoo-purple-dark), var(--yahoo-purple)); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.modal-title { font-size: 15px; font-weight: 700; color: var(--yahoo-yellow); }
.modal-close { background: none; border: none; color: white; cursor: pointer; font-size: 18px; padding: 0 4px; }
.modal-body { padding: 20px; overflow-y: auto; }
.avatar-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin: 10px 0; }
.avatar-opt { font-size: 24px; padding: 4px; border: 2px solid var(--border); border-radius: 4px; cursor: pointer; text-align: center; transition: all 0.15s; background: var(--bg-input); }
.avatar-opt:hover { border-color: var(--yahoo-purple-light); }
.avatar-opt.selected { border-color: var(--yahoo-yellow); background: rgba(255,215,0,0.1); }
/* FRIEND */
.friend-search-results { max-height: 200px; overflow-y: auto; margin-top: 8px; }
.friend-result-item { display: flex; align-items: center; gap: 8px; padding: 8px; border: 1px solid var(--border); border-radius: 3px; margin-bottom: 4px; background: var(--bg-input); }
.btn-small { padding: 4px 10px; font-size: 11px; background: linear-gradient(135deg, var(--yahoo-purple), var(--yahoo-purple-light)); border: none; border-radius: 2px; color: white; cursor: pointer; font-weight: 700; font-family: 'Noto Sans TC', sans-serif; white-space: nowrap; }
.btn-small:hover { opacity: 0.85; }
.btn-small.danger { background: linear-gradient(135deg, #c0392b, #e74c3c); }
/* DM */
.dm-list { overflow-y: auto; }
.dm-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; font-size: 13px; }
.dm-item:hover { background: rgba(114,14,158,0.2); border-left-color: var(--online-green); }
.dm-item.active { background: rgba(74,255,145,0.1); border-left-color: var(--online-green); color: var(--online-green); }
.room-badge { background: var(--yahoo-yellow); color: #000; border-radius: 10px; font-size: 10px; padding: 1px 5px; font-weight: 700; }
/* NO CHAT */
.no-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); }
.no-chat-logo { font-family: 'Press Start 2P', monospace; font-size: 36px; color: var(--yahoo-purple); opacity: 0.4; margin-bottom: 16px; }
/* TOAST */
.toast { position: fixed; top: 70px; right: 20px; background: var(--bg-panel); border: 1px solid var(--border-bright); border-left: 4px solid var(--yahoo-yellow); border-radius: 3px; padding: 12px 16px; z-index: 300; max-width: 280px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); animation: slideIn 0.3s ease; font-size: 13px; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
/* SCROLLBARS */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.section-label { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin: 12px 0 6px; font-weight: 700; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-header">
      <div class="yahoo-logo">Yahoo!<span>聊天室</span></div>
      <div class="auth-subtitle">Chat · 與世界連線</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">登入</button>
      <button class="auth-tab" onclick="switchTab('register')">註冊</button>
    </div>
    <div id="login-form" class="auth-form active">
      <div class="form-group"><label>帳號</label><input type="text" id="login-user" placeholder="輸入帳號"></div>
      <div class="form-group"><label>密碼</label><input type="password" id="login-pass" placeholder="輸入密碼"></div>
      <button class="btn-yahoo" onclick="doLogin()">登入聊天室</button>
      <div class="auth-error" id="login-error"></div>
    </div>
    <div id="register-form" class="auth-form">
      <div class="form-group"><label>帳號</label><input type="text" id="reg-user" placeholder="設定帳號"></div>
      <div class="form-group"><label>暱稱</label><input type="text" id="reg-nick" placeholder="顯示暱稱（可不填）"></div>
      <div class="form-group"><label>密碼</label><input type="password" id="reg-pass" placeholder="設定密碼"></div>
      <button class="btn-yahoo" onclick="doRegister()">建立帳號</button>
      <div class="auth-error" id="reg-error"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Y!<span>聊天室</span></div>
    <div class="topbar-spacer"></div>
    <!-- Brightness Slider -->
    <div class="brightness-wrap">
      <span>🌙</span>
      <input type="range" id="brightness-slider" min="50" max="150" value="100" oninput="setBrightness(this.value)">
      <span>☀️</span>
    </div>
    <!-- Theme Toggle -->
    <div class="theme-toggle" onclick="toggleTheme()">
      <div class="theme-toggle-track"><div class="theme-toggle-thumb" id="theme-thumb">🌙</div></div>
      <span class="theme-label" id="theme-label">暗色</span>
    </div>
    <button class="btn-topbar" onclick="openModal('friend-modal')">👥 好友</button>
    <button class="btn-topbar" onclick="openModal('profile-modal')">⚙️ 設定</button>
    <div class="topbar-user" onclick="openModal('profile-modal')">
      <div class="topbar-avatar" id="tb-avatar">😺</div>
      <div class="topbar-username" id="tb-username">載入中...</div>
      <div class="status-dot" id="tb-status-dot"></div>
    </div>
    <button class="btn-topbar" onclick="doLogout()">登出</button>
  </div>
  <div class="main-layout">
    <!-- Left -->
    <div class="sidebar-left">
      <div class="sidebar-section-header">聊天室<button class="sidebar-add-btn" onclick="openModal('create-room-modal')">＋</button></div>
      <div class="room-list" id="room-list"></div>
      <div class="sidebar-section-header" style="margin-top:auto">私訊</div>
      <div class="dm-list" id="dm-list"></div>
    </div>
    <!-- Chat -->
    <div class="chat-area" id="chat-area">
      <div class="no-chat"><div class="no-chat-logo">Y!</div><div>選擇聊天室或私訊開始聊天</div></div>
    </div>
    <!-- Right -->
    <div class="sidebar-right">
      <div class="sidebar-section-header">線上用戶</div>
      <div class="user-list" id="user-list"></div>
    </div>
  </div>
</div>

<!-- Emoji Panel -->
<div class="float-panel" id="emoji-panel">
  <div style="display:flex;gap:4px;margin-bottom:8px">
    <button class="toolbar-btn active" onclick="switchEmojiTab('emoji',this)">表情</button>

<!-- Friend Modal -->
<div class="modal-overlay" id="friend-modal">

        <button class="btn-small" onclick="searchUsers()">🔍 搜尋</button>

<!-- Create Room Modal -->
<div class="modal-overlay" id="create-room-modal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">＋ 建立聊天室</span><button class="modal-close" onclick="closeModal('create-room-modal')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>聊天室名稱</label><input type="text" id="new-room-name" placeholder="輸入名稱"></div>

          <select id="new-room-cat"><option>一般</option><option>娛樂</option><option>生活</option><option>學習</option><option>其他</option></select>

    </div>

</div>

<script>
const API = window.location.origin;
let token = localStorage.getItem('yc_token') || null;
let me = null, socket = null;
let currentRoom = null, currentDM = null;
let msgColor = '#f0e6ff', msgBold = false, msgItalic = false;
let selectedAvatar = '😺';
let rooms = [], onlineUsers = [];
let dmHistory = {}, roomMessages = {};
let unreadDMs = {}, typingTimers = {};
let dmUsers = new Set();
let isLight = localStorage.getItem('yc_theme') === 'light';

const AVATARS = ['😺','🐶','🦊','🐼','🐨','🦁','🐸','🐯','🐙','🦋','🐬','🦄','🐉','🤖','👽','🎃','🧸','🌸','⭐','🔥','💎','🎭','🦅','🐺'];
const EMOJIS = ['😀','😂','🥰','😍','🤩','😎','🤔','😏','😒','😢','😭','😡','🥺','😇','🤗','😴','🤯','🥳','😈','💀','👻','🤡','💩','🙈','🙉','🙊','💕','💖','💙','💚','💛','💜','❤️','🔥','⭐','✨','💫','🌟','🎉','🎊','🎈','🎁','🏆','💪','👍','👎','🙌','👏','✌️','🤞'];
const KAOMOJIS = ['(≧▽≦)','(^▽^)','(｡♥‿♥｡)','(◕‿◕)','(ノ°▽°)ノ','（╯°□°）╯','(っ◔◡◔)っ','ヽ(✿ﾟ▽ﾟ)ノ','(ง •̀_•́)ง','(T_T)','(╥_╥)','o(╥﹏╥)o','(；′⌒`)','(=_=)','(>_<)','(づ｡◕‿‿◕｡)づ','ʕ•ᴥ•ʔ','┻━┻ ︵ヽ(`Д´)ﾉ','(ノ◕ヮ◕)ノ*:･ﾟ✧'];
const STICKERS = ['🎉','🎊','🎈','🎁','🏆','💎','🔥','⚡','🌈','🦋','🌸','🌺','🍀','🎵','🎶','🎸','🎤','🎮','🕹️','💻','📱','🚀','🛸','🌙','⭐','💫','✨','🌟','❄️','🌊','🎭','🎨'];
const COLORS = ['#f0e6ff','#ff6b6b','#ffd700','#51cf66','#339af0','#cc5de8','#ff922b','#20c997','#f06595','#a9e34b','#74c0fc','#b197fc','#ffffff','#adb5bd','#495057','#212529'];

// Theme
function applyTheme() {
  document.body.classList.toggle('light', isLight);
  const thumb = document.getElementById('theme-thumb');
  const label = document.getElementById('theme-label');
  if (thumb) thumb.textContent = isLight ? '☀️' : '🌙';
  if (label) label.textContent = isLight ? '亮色' : '暗色';
}
function toggleTheme() {
  isLight = !isLight;
  localStorage.setItem('yc_theme', isLight ? 'light' : 'dark');
  applyTheme();
}
function setBrightness(val) {
  document.documentElement.style.filter = `brightness(${val}%)`;
  localStorage.setItem('yc_brightness', val);
}
// Init theme
applyTheme();
const savedBrightness = localStorage.getItem('yc_brightness');
if (savedBrightness) {
  document.documentElement.style.filter = `brightness(${savedBrightness}%)`;
}

// API
async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}) },
    body: body ? JSON.stringify(body) : undefined
  });
  return res.json();
}

// Auth
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (tab === 'login' ? 0 : 1) === i));
  document.getElementById('login-form').classList.toggle('active', tab === 'login');
  document.getElementById('register-form').classList.toggle('active', tab === 'register');
}
async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const res = await api('POST', '/api/login', { username, password });
  if (res.error) { document.getElementById('login-error').textContent = res.error; return; }
  token = res.token; me = res.user;
  localStorage.setItem('yc_token', token);
  startApp();
}
async function doRegister() {
  const username = document.getElementById('reg-user').value.trim();
  const nickname = document.getElementById('reg-nick').value.trim();
  const password = document.getElementById('reg-pass').value;
  const res = await api('POST', '/api/register', { username, password, nickname });
  if (res.error) { document.getElementById('reg-error').textContent = res.error; return; }
  token = res.token; me = res.user;
  localStorage.setItem('yc_token', token);
  startApp();
}
function doLogout() { localStorage.removeItem('yc_token'); location.reload(); }

// App Init
async function startApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  updateTopbar();
  initSocket();
  await loadRooms();
  await loadFriends();
  buildEmojiPanel(); buildStickerPanel(); buildColorPanel(); buildAvatarGrid();
  // Restore brightness slider
  const sb = localStorage.getItem('yc_brightness');
  if (sb) document.getElementById('brightness-slider').value = sb;
}

function updateTopbar() {
  document.getElementById('tb-avatar').textContent = me.avatar || '😺';
  document.getElementById('tb-username').textContent = me.nickname || me.username;
  const colors = { online: 'var(--online-green)', away: 'var(--away-yellow)', busy: 'var(--busy-red)', invisible: '#666' };
  document.getElementById('tb-status-dot').style.background = colors[me.status] || 'var(--online-green)';
}

// Socket
function initSocket() {
  socket = io(API, { auth: { token } });
  socket.on('users:online', (users) => { onlineUsers = users; renderUserList(); });
  socket.on('user:status', ({ username, status, statusMsg }) => { if (username === me.username) { me.status = status; me.statusMsg = statusMsg; } renderUserList(); });
  socket.on('room:new', (room) => { if (!rooms.find(r => r.name === room.name)) { rooms.push(room); renderRoomList(); } });
  socket.on('room:history', ({ room, messages }) => { roomMessages[room] = messages; if (currentRoom === room) renderMessages(); });
  socket.on('message:room', (msg) => {
    if (!roomMessages[msg.room]) roomMessages[msg.room] = [];
    roomMessages[msg.room].push(msg);
    if (currentRoom === msg.room) renderMessages();
  });
  socket.on('message:dm', (msg) => {
    const other = msg.from === me.username ? msg.to : msg.from;
    if (!dmHistory[other]) dmHistory[other] = [];
    dmHistory[other].push(msg);
    if (currentDM === other) renderMessages();
    else if (msg.from !== me.username) {
      unreadDMs[other] = (unreadDMs[other] || 0) + 1;
      dmUsers.add(other); renderDMList();
      showToast('📨 ' + other + ': ' + msg.content.substring(0, 40));
    }
  });
  socket.on('typing:room', ({ username, isTyping }) => {
    const el = document.getElementById('typing-indicator');
    if (el) el.textContent = isTyping ? username + ' 正在輸入...' : '';
  });
  socket.on('typing:dm', ({ username, isTyping }) => {
    if (username !== currentDM) return;
    const el = document.getElementById('typing-indicator');
    if (el) el.textContent = isTyping ? username + ' 正在輸入...' : '';
  });
}

// Rooms
async function loadRooms() { rooms = await api('GET', '/api/rooms'); renderRoomList(); }
function renderRoomList() {
  const el = document.getElementById('room-list');
  const cats = [...new Set(rooms.map(r => r.category))];
  el.innerHTML = '';
  cats.forEach(cat => {
    const catEl = document.createElement('div');
    catEl.innerHTML = '<div style="padding:8px 14px 2px;font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border)">' + cat + '</div>';
    rooms.filter(r => r.category === cat).forEach(room => {
      const div = document.createElement('div');
      div.className = 'room-item' + (currentRoom === room.name ? ' active' : '');
      div.innerHTML = '<span>💬</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + room.name + '</span>';
      div.onclick = () => joinRoom(room.name);
      catEl.appendChild(div);
    });
    el.appendChild(catEl);
  });
}
function joinRoom(name) {
  if (currentRoom && currentRoom !== name) socket.emit('room:leave', { room: currentRoom });
  currentRoom = name; currentDM = null;
  socket.emit('room:join', { room: name });
  renderRoomList(); renderDMList();
  openChatArea('room', name);
}

// DM
function openDM(username) {
  if (currentRoom) { socket.emit('room:leave', { room: currentRoom }); currentRoom = null; }
  currentDM = username; dmUsers.add(username); unreadDMs[username] = 0;
  renderRoomList(); renderDMList();
  api('GET', '/api/dm/' + username).then(msgs => { dmHistory[username] = msgs; renderMessages(); });
  openChatArea('dm', username);
}
function renderDMList() {
  const el = document.getElementById('dm-list'); el.innerHTML = '';
  dmUsers.forEach(username => {
    const div = document.createElement('div');
    div.className = 'dm-item' + (currentDM === username ? ' active' : '');
    const unread = unreadDMs[username] || 0;
    div.innerHTML = '<span style="font-size:8px;color:' + (onlineUsers.includes(username) ? 'var(--online-green)' : '#666') + '">●</span><span style="flex:1">' + username + '</span>' + (unread ? '<span class="room-badge">' + unread + '</span>' : '');
    div.onclick = () => openDM(username);
    el.appendChild(div);
  });
}

// Chat Area
function openChatArea(type, name) {
  const area = document.getElementById('chat-area');
  const room = type === 'room' ? rooms.find(r => r.name === name) : null;
  area.innerHTML = '<div class="chat-header"><span class="chat-room-name">' + (type === 'dm' ? '💌 ' : '') + name + '</span>' + (room ? '<span class="chat-room-topic">' + room.topic + '</span>' : '') + '<span class="chat-type-badge ' + (type === 'dm' ? 'badge-dm' : 'badge-public') + '">' + (type === 'dm' ? '私訊' : '公開') + '</span></div><div class="messages-container" id="messages-container"></div><div class="typing-indicator" id="typing-indicator"></div><div class="input-bar"><div class="input-toolbar"><button class="toolbar-btn" id="btn-bold" onclick="toggleBold()"><b>B</b></button><button class="toolbar-btn" id="btn-italic" onclick="toggleItalic()"><i>I</i></button><button class="toolbar-btn" onclick="togglePanel(\'color\')"><span class="color-dot" id="cur-color-dot" style="background:' + msgColor + '"></span>顏色</button><button class="toolbar-btn" onclick="togglePanel(\'emoji\')">😀 表情</button><button class="toolbar-btn" onclick="togglePanel(\'sticker\')">🎭 貼圖</button></div><div class="input-row"><textarea id="msg-input" rows="1" placeholder="輸入訊息..." onkeydown="handleKey(event)" oninput="handleTyping()"></textarea><button class="btn-send" onclick="sendMessage()">傳送 ▶</button></div></div>';
  renderMessages();
}
function renderMessages() {
  const container = document.getElementById('messages-container');
  if (!container) return;
  const msgs = currentRoom ? (roomMessages[currentRoom] || []) : (dmHistory[currentDM] || []);
  container.innerHTML = '';
  msgs.forEach(m => {
    const isMine = m.from === me.username;
    const isSystem = m.type === 'system';
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap' + (isMine ? ' mine' : '');
    const time = new Date(m.timestamp).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    if (!isSystem) wrap.innerHTML = '<div class="msg-meta"><span class="msg-username" onclick="onClickUser(\'' + m.from + '\')">' + m.from + '</span><span>' + time + '</span></div>';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble ' + (isSystem ? 'system' : isMine ? 'mine' : 'other') + (m.type === 'sticker' ? ' sticker' : '') + (m.type === 'emote' ? ' emote' : '');
    if (m.color && !isSystem) bubble.style.color = m.color;
    if (m.bold) bubble.style.fontWeight = '700';
    if (m.italic) bubble.style.fontStyle = 'italic';
    bubble.textContent = m.content;
    wrap.appendChild(bubble);
    container.appendChild(wrap);
  });
  container.scrollTop = container.scrollHeight;
}

// Send
function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim(); if (!content) return;
  if (currentRoom) socket.emit('message:room', { room: currentRoom, content, type: 'text', color: msgColor, bold: msgBold, italic: msgItalic });
  else if (currentDM) socket.emit('message:dm', { to: currentDM, content, type: 'text', color: msgColor, bold: msgBold, italic: msgItalic });
  input.value = ''; input.style.height = 'auto'; closeAllPanels();
}
function sendSticker(s) {
  if (currentRoom) socket.emit('message:room', { room: currentRoom, content: s, type: 'sticker' });
  else if (currentDM) socket.emit('message:dm', { to: currentDM, content: s, type: 'sticker' });
  closeAllPanels();
}
function insertEmoji(e) { const i = document.getElementById('msg-input'); if (i) { i.value += e; i.focus(); } closeAllPanels(); }

function handleTyping() {
  const input = document.getElementById('msg-input');
  input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  if (currentRoom) socket.emit('typing:room', { room: currentRoom, isTyping: true });
  else if (currentDM) socket.emit('typing:dm', { to: currentDM, isTyping: true });
  clearTimeout(typingTimers.main);
  typingTimers.main = setTimeout(() => {
    if (currentRoom) socket.emit('typing:room', { room: currentRoom, isTyping: false });
    else if (currentDM) socket.emit('typing:dm', { to: currentDM, isTyping: false });
  }, 2000);
}
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

// Users
function renderUserList() {
  const el = document.getElementById('user-list'); el.innerHTML = '';
  onlineUsers.filter(u => u !== me.username).forEach(username => {
    const div = document.createElement('div');
    div.className = 'user-item';
    div.innerHTML = '<span style="font-size:18px">😺</span><span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + username + '</span><span class="user-status-dot status-online"></span>';
    div.onclick = () => onClickUser(username);
    el.appendChild(div);
  });
}
function onClickUser(username) {
  if (username === me.username || username === 'System') return;
  if (confirm('開啟與 ' + username + ' 的私訊？')) openDM(username);
}

// Toolbar
function toggleBold() { msgBold = !msgBold; document.getElementById('btn-bold').classList.toggle('active', msgBold); }
function toggleItalic() { msgItalic = !msgItalic; document.getElementById('btn-italic').classList.toggle('active', msgItalic); }
function setColor(c) {
  msgColor = c;
  const dot = document.getElementById('cur-color-dot'); if (dot) dot.style.background = c;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('selected', s.dataset.color === c));
  closeAllPanels();
}
function togglePanel(name) {
  const ids = { emoji: 'emoji-panel', sticker: 'sticker-panel', color: 'color-panel' };
  const target = document.getElementById(ids[name]);
  const isShown = target.classList.contains('show');
  closeAllPanels();
  if (!isShown) target.classList.add('show');
}
function closeAllPanels() { ['emoji-panel','sticker-panel','color-panel'].forEach(id => document.getElementById(id).classList.remove('show')); }
document.addEventListener('click', e => {
  if (!e.target.closest('.float-panel') && !e.target.closest('[onclick*="Panel"]') && !e.target.closest('[onclick*="panel"]')) closeAllPanels();
});

// Build Panels
function buildEmojiPanel() {
  const grid = document.getElementById('emoji-grid');
  EMOJIS.forEach(e => { const btn = document.createElement('button'); btn.className = 'emoji-btn'; btn.textContent = e; btn.onclick = () => insertEmoji(e); grid.appendChild(btn); });
}
function switchEmojiTab(type, btn) {
  document.querySelectorAll('#emoji-panel .toolbar-btn').forEach(t => t.classList.remove('active')); btn.classList.add('active');
  const grid = document.getElementById('emoji-grid'); grid.innerHTML = '';
  (type === 'emoji' ? EMOJIS : KAOMOJIS).forEach(e => {
    const b = document.createElement('button'); b.className = 'emoji-btn'; b.textContent = e;
    b.style.fontSize = type === 'kaomoji' ? '11px' : '22px'; b.onclick = () => insertEmoji(e); grid.appendChild(b);
  });
}
function buildStickerPanel() {
  const grid = document.getElementById('sticker-grid');
  STICKERS.forEach(s => { const btn = document.createElement('button'); btn.className = 'sticker-btn'; btn.textContent = s; btn.onclick = () => sendSticker(s); grid.appendChild(btn); });
}
function buildColorPanel() {
  const el = document.getElementById('color-swatches');
  COLORS.forEach(c => { const div = document.createElement('div'); div.className = 'color-swatch'; div.style.background = c; div.dataset.color = c; div.onclick = () => setColor(c); el.appendChild(div); });
}
function buildAvatarGrid() {
  const grid = document.getElementById('avatar-grid'); grid.innerHTML = '';
  AVATARS.forEach(a => {
    const div = document.createElement('div'); div.className = 'avatar-opt' + (a === (me.avatar || '😺') ? ' selected' : '');
    div.textContent = a;
    div.onclick = () => { document.querySelectorAll('.avatar-opt').forEach(x => x.classList.remove('selected')); div.classList.add('selected'); selectedAvatar = a; };
    grid.appendChild(div);
  });
}

// Profile
function openModal(id) {
  if (id === 'profile-modal') {
    document.getElementById('p-nickname').value = me.nickname || '';
    document.getElementById('p-status').value = me.status || 'online';
    document.getElementById('p-statusMsg').value = me.statusMsg || '';
    selectedAvatar = me.avatar || '😺'; buildAvatarGrid();
  }
  if (id === 'friend-modal') loadFriends();
  document.getElementById(id).classList.add('show');
}
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
async function saveProfile() {
  const nickname = document.getElementById('p-nickname').value.trim();
  const status = document.getElementById('p-status').value;
  const statusMsg = document.getElementById('p-statusMsg').value.trim();
  const res = await api('PUT', '/api/me', { nickname, avatar: selectedAvatar, status, statusMsg });
  me = { ...me, ...res }; updateTopbar();
  socket.emit('user:status', { status, statusMsg });
  closeModal('profile-modal'); showToast('✅ 個人資料已更新');
}

// Friends - FIXED
async function loadFriends() {
  const data = await api('GET', '/api/friends');
  renderFriends(data);
}
function renderFriends({ friends, requests }) {
  const reqEl = document.getElementById('friend-requests');
  const listEl = document.getElementById('friends-list');
  if (!reqEl || !listEl) return;
  reqEl.innerHTML = requests && requests.length ? requests.map(u => '<div class="friend-result-item"><span style="font-size:18px">😺</span><span style="flex:1;font-size:13px">' + u + '</span><button class="btn-small" onclick="acceptFriend(\'' + u + '\')">✅ 接受</button></div>').join('') : '<div style="color:var(--text-dim);font-size:12px">暫無好友請求</div>';
  listEl.innerHTML = friends && friends.length ? friends.map(u => '<div class="friend-result-item"><span style="font-size:18px">😺</span><span style="flex:1;font-size:13px">' + u + '</span><span style="font-size:10px;color:' + (onlineUsers.includes(u) ? 'var(--online-green)' : '#666') + '">' + (onlineUsers.includes(u) ? '🟢 線上' : '⚫ 離線') + '</span><button class="btn-small" onclick="openDM(\'' + u + '\');closeModal(\'friend-modal\')">💬 私訊</button></div>').join('') : '<div style="color:var(--text-dim);font-size:12px">還沒有好友，去搜尋新朋友吧！</div>';
}

async function searchUsers() {
  const q = document.getElementById('friend-search').value.trim();
  if (!q) { showToast('⚠️ 請輸入搜尋關鍵字'); return; }
  const el = document.getElementById('friend-search-results');
  el.innerHTML = '<div style="color:var(--text-dim);font-size:12px">搜尋中...</div>';
  try {
    const users = await api('GET', '/api/users/search?q=' + encodeURIComponent(q));
    if (!users || users.length === 0) { el.innerHTML = '<div style="color:var(--text-dim);font-size:12px">找不到用戶「' + q + '」</div>'; return; }
    el.innerHTML = users.filter(u => u.username !== me.username).map(u =>
      '<div class="friend-result-item"><span style="font-size:18px">' + (u.avatar || '😺') + '</span><div style="flex:1"><div style="font-size:13px;font-weight:700">' + (u.nickname || u.username) + '</div><div style="font-size:11px;color:var(--text-dim)">@' + u.username + '</div></div><button class="btn-small" onclick="addFriend(\'' + u.username + '\')">➕ 加好友</button></div>'
    ).join('') || '<div style="color:var(--text-dim);font-size:12px">找不到其他用戶</div>';
  } catch(e) { el.innerHTML = '<div style="color:#ff6b6b;font-size:12px">搜尋失敗，請重試</div>'; }
}

async function addFriend(username) {
  const res = await api('POST', '/api/friends/request', { username });
  if (res.error) { showToast('❌ ' + res.error); return; }
  showToast('✅ 已傳送好友邀請給 ' + username);
  // Update button
  document.querySelectorAll('.friend-result-item').forEach(item => {
    if (item.textContent.includes('@' + username)) {
      const btn = item.querySelector('button'); if (btn) { btn.textContent = '✓ 已邀請'; btn.disabled = true; btn.style.opacity = '0.6'; }
    }
  });
}
async function acceptFriend(username) {
  await api('POST', '/api/friends/accept', { username });
  showToast('✅ 已新增 ' + username + ' 為好友');
  await loadFriends();
}

// Create Room
async function createRoom() {
  const name = document.getElementById('new-room-name').value.trim();
  const category = document.getElementById('new-room-cat').value;
  const topic = document.getElementById('new-room-topic').value.trim();
  if (!name) { showToast('⚠️ 請輸入聊天室名稱'); return; }
  const res = await api('POST', '/api/rooms', { name, category, topic });
  if (res.error) { showToast('❌ ' + res.error); return; }
  closeModal('create-room-modal'); joinRoom(name);
}

// Toast
function showToast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 3500);
}

// Auto Login
(async () => {
  if (token) {
    const res = await api('GET', '/api/me');
    if (!res.error) { me = res; startApp(); }
    else { localStorage.removeItem('yc_token'); token = null; }
  }
})();
</script>
