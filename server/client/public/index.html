<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yahoo! 聊天室</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root {
  --yahoo-purple: #720E9E;
  --yahoo-purple-dark: #4A0066;
  --yahoo-purple-light: #9B40C8;
  --yahoo-yellow: #FFD700;
  --yahoo-yellow-hover: #FFC107;
  --bg-dark: #1a0a2e;
  --bg-panel: #12071f;
  --bg-card: #1e0d35;
  --bg-input: #0f0520;
  --border: #3d1a5c;
  --border-bright: #6b35a0;
  --text-primary: #f0e6ff;
  --text-secondary: #b08fd0;
  --text-dim: #7a5a99;
  --online-green: #4AFF91;
  --away-yellow: #FFD700;
  --busy-red: #FF5555;
  --scrollbar-track: #1a0a2e;
  --scrollbar-thumb: #4d1f75;
  --msg-mine: #2d0f4a;
  --msg-other: #1a0833;
  --msg-system: transparent;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(114,14,158,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(155,64,200,0.1) 0%, transparent 40%),
    radial-gradient(ellipse at 60% 80%, rgba(74,0,102,0.2) 0%, transparent 50%);
}

/* ─── AUTH SCREEN ─────────────────────────────────────────────────────────── */
#auth-screen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-dark);
  background-image:
    radial-gradient(ellipse at 30% 40%, rgba(114,14,158,0.3) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 60%, rgba(74,0,102,0.2) 0%, transparent 50%);
}

.auth-box {
  width: 420px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(114,14,158,0.4), 0 0 120px rgba(114,14,158,0.15);
}

.auth-header {
  background: linear-gradient(135deg, var(--yahoo-purple-dark) 0%, var(--yahoo-purple) 50%, var(--yahoo-purple-light) 100%);
  padding: 28px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.auth-header::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.03) 10px, rgba(255,255,255,0.03) 20px);
}

.yahoo-logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 28px;
  color: var(--yahoo-yellow);
  text-shadow: 3px 3px 0px rgba(0,0,0,0.5), 0 0 30px rgba(255,215,0,0.5);
  letter-spacing: -1px;
  position: relative;
}
.yahoo-logo span { color: #fff; }

.auth-subtitle {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  margin-top: 6px;
  letter-spacing: 2px;
  text-transform: uppercase;
  position: relative;
}

.auth-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.auth-tab {
  flex: 1; padding: 14px;
  background: none; border: none; cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px; font-weight: 700;
  color: var(--text-dim);
  transition: all 0.2s;
  border-bottom: 2px solid transparent;
}
.auth-tab.active {
  color: var(--yahoo-yellow);
  border-bottom-color: var(--yahoo-yellow);
  background: rgba(255,215,0,0.05);
}

.auth-form { padding: 28px 32px; display: none; }
.auth-form.active { display: block; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
.form-group input, .form-group select {
  width: 100%; padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-primary);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  transition: border-color 0.2s;
  outline: none;
}
.form-group input:focus, .form-group select:focus { border-color: var(--yahoo-purple-light); }

.btn-yahoo {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--yahoo-purple), var(--yahoo-purple-light));
  border: none; border-radius: 3px;
  color: white; font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  margin-top: 8px;
  position: relative; overflow: hidden;
}
.btn-yahoo:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(114,14,158,0.5); }
.btn-yahoo:active { transform: translateY(0); }

.auth-error { color: #ff6b6b; font-size: 13px; margin-top: 10px; text-align: center; }

/* ─── MAIN APP ────────────────────────────────────────────────────────────── */
#app { display: none; height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

/* Top Bar */
.topbar {
  height: 52px; min-height: 52px;
  background: linear-gradient(90deg, var(--yahoo-purple-dark) 0%, var(--yahoo-purple) 60%, var(--yahoo-purple-light) 100%);
  display: flex; align-items: center; padding: 0 16px;
  gap: 12px; border-bottom: 2px solid var(--yahoo-yellow);
  box-shadow: 0 2px 20px rgba(114,14,158,0.5);
  position: relative; z-index: 10;
}
.topbar-logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 16px; color: var(--yahoo-yellow);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
  flex-shrink: 0;
}
.topbar-logo span { color: white; font-size: 12px; margin-left: 6px; font-family: 'Noto Sans TC', sans-serif; font-weight: 400; opacity: 0.8; }

.topbar-spacer { flex: 1; }

.topbar-user {
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,0.2); border-radius: 20px;
  padding: 4px 12px 4px 4px; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.15);
}
.topbar-avatar { width: 28px; height: 28px; border-radius: 50%; font-size: 18px; line-height: 28px; text-align: center; }
.topbar-username { font-size: 13px; font-weight: 700; color: white; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--online-green); box-shadow: 0 0 6px var(--online-green); }

.btn-topbar {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
  border-radius: 3px; padding: 5px 12px;
  color: white; font-size: 12px; cursor: pointer;
  transition: all 0.2s; font-family: 'Noto Sans TC', sans-serif; font-weight: 700;
}
.btn-topbar:hover { background: rgba(255,255,255,0.25); }

/* Main Layout */
.main-layout {
  display: flex; flex: 1; overflow: hidden;
}

/* Left Sidebar - Room List */
.sidebar-left {
  width: 220px; min-width: 220px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.sidebar-section-header {
  padding: 10px 14px 6px;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-dim); font-weight: 700;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-add-btn {
  background: none; border: none; color: var(--yahoo-yellow);
  cursor: pointer; font-size: 16px; line-height: 1;
  padding: 0 2px; transition: transform 0.2s;
}
.sidebar-add-btn:hover { transform: scale(1.2); }

.room-list { flex: 1; overflow-y: auto; }
.room-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s; font-size: 13px;
}
.room-item:hover { background: rgba(114,14,158,0.2); border-left-color: var(--yahoo-purple-light); }
.room-item.active { background: rgba(114,14,158,0.35); border-left-color: var(--yahoo-yellow); color: var(--yahoo-yellow); }
.room-icon { font-size: 14px; flex-shrink: 0; }
.room-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.room-badge { background: var(--yahoo-yellow); color: #000; border-radius: 10px; font-size: 10px; padding: 1px 5px; font-weight: 700; display: none; }
.room-badge.show { display: inline; }

/* Right Sidebar - Users */
.sidebar-right {
  width: 190px; min-width: 190px;
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.user-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.user-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; cursor: pointer;
  transition: background 0.15s; font-size: 13px;
  position: relative;
}
.user-item:hover { background: rgba(114,14,158,0.2); }
.user-avatar-sm { font-size: 18px; flex-shrink: 0; }
.user-info-sm { flex: 1; overflow: hidden; }
.user-name-sm { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-status-sm { font-size: 10px; color: var(--text-dim); }
.user-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.status-online { background: var(--online-green); }
.status-away { background: var(--away-yellow); }
.status-busy { background: var(--busy-red); }
.status-offline { background: #666; }

/* Center Chat Area */
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-card); }

.chat-header {
  padding: 12px 18px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.chat-room-name { font-size: 16px; font-weight: 700; color: var(--yahoo-yellow); }
.chat-room-topic { font-size: 12px; color: var(--text-dim); margin-left: 4px; }
.chat-type-badge {
  font-size: 10px; padding: 2px 8px;
  border-radius: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
}
.badge-public { background: rgba(114,14,158,0.4); color: var(--yahoo-purple-light); border: 1px solid var(--yahoo-purple); }
.badge-dm { background: rgba(74,255,145,0.15); color: var(--online-green); border: 1px solid rgba(74,255,145,0.3); }

/* Messages */
.messages-container { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 2px; }

.msg-wrap { display: flex; flex-direction: column; }
.msg-wrap.mine { align-items: flex-end; }

.msg-meta { font-size: 10px; color: var(--text-dim); padding: 0 4px; margin-bottom: 2px; display: flex; gap: 6px; }
.msg-wrap.mine .msg-meta { flex-direction: row-reverse; }
.msg-username { color: var(--yahoo-purple-light); font-weight: 700; cursor: pointer; }
.msg-username:hover { color: var(--yahoo-yellow); }

.msg-bubble {
  max-width: 70%; padding: 8px 12px;
  border-radius: 2px;
  font-size: 14px; line-height: 1.5;
  word-break: break-word;
  border-left: 3px solid transparent;
}
.msg-bubble.other { background: var(--msg-other); border-left-color: var(--yahoo-purple); }
.msg-bubble.mine  { background: var(--msg-mine);  border-left-color: var(--yahoo-yellow); }
.msg-bubble.system {
  background: none; border: none;
  color: var(--text-dim); font-style: italic; font-size: 12px;
  text-align: center; width: 100%; max-width: 100%;
  padding: 4px 0;
}
.msg-bubble.sticker { background: none; border: none; font-size: 48px; padding: 4px; }
.msg-bubble.emote { color: var(--yahoo-purple-light); font-style: italic; background: none; border-color: transparent; }

.typing-indicator {
  padding: 6px 16px; font-size: 12px;
  color: var(--text-dim); font-style: italic;
  min-height: 26px;
}

/* Input Bar */
.input-bar {
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
}
.input-toolbar {
  padding: 6px 12px; display: flex; gap: 4px; align-items: center;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.toolbar-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 2px; padding: 3px 7px;
  color: var(--text-secondary); cursor: pointer;
  font-size: 12px; transition: all 0.15s;
  font-family: 'Noto Sans TC', sans-serif;
}
.toolbar-btn:hover { background: rgba(114,14,158,0.3); border-color: var(--yahoo-purple-light); color: var(--text-primary); }
.toolbar-btn.active { background: rgba(114,14,158,0.5); border-color: var(--yahoo-yellow); color: var(--yahoo-yellow); }
.color-picker-btn { display: flex; align-items: center; gap: 4px; }
.color-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); }

.input-row { display: flex; gap: 10px; padding: 10px 12px; align-items: flex-end; }
#msg-input {
  flex: 1; padding: 9px 12px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 3px; color: var(--text-primary);
  font-family: 'Noto Sans TC', sans-serif; font-size: 14px;
  outline: none; resize: none; max-height: 100px; min-height: 38px;
  line-height: 1.4; transition: border-color 0.2s;
}
#msg-input:focus { border-color: var(--yahoo-purple-light); }

.btn-send {
  padding: 9px 20px; background: linear-gradient(135deg, var(--yahoo-purple), var(--yahoo-purple-light));
  border: none; border-radius: 3px;
  color: white; font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.btn-send:hover { box-shadow: 0 2px 12px rgba(114,14,158,0.5); }

/* Emoji Picker */
.emoji-panel {
  position: absolute; bottom: 100px; left: 220px;
  background: var(--bg-panel); border: 1px solid var(--border-bright);
  border-radius: 4px; padding: 10px;
  display: none; z-index: 50;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  width: 320px;
}
.emoji-panel.show { display: block; }
.emoji-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
.emoji-tab {
  padding: 4px 8px; font-size: 11px; cursor: pointer;
  background: none; border: 1px solid var(--border); border-radius: 3px;
  color: var(--text-secondary); transition: all 0.15s;
}
.emoji-tab.active { border-color: var(--yahoo-purple-light); color: var(--yahoo-yellow); }
.emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; max-height: 200px; overflow-y: auto; }
.emoji-btn {
  font-size: 22px; padding: 4px; border: none; background: none;
  cursor: pointer; border-radius: 3px; transition: background 0.15s; line-height: 1;
}
.emoji-btn:hover { background: rgba(114,14,158,0.3); }

/* Sticker Panel */
.sticker-panel {
  position: absolute; bottom: 100px; left: 220px;
  background: var(--bg-panel); border: 1px solid var(--border-bright);
  border-radius: 4px; padding: 10px;
  display: none; z-index: 50;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  width: 280px;
}
.sticker-panel.show { display: block; }
.sticker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.sticker-btn {
  font-size: 40px; padding: 8px; border: 1px solid var(--border);
  background: var(--bg-card); cursor: pointer;
  border-radius: 4px; transition: all 0.15s; line-height: 1; text-align: center;
}
.sticker-btn:hover { border-color: var(--yahoo-yellow); transform: scale(1.05); background: rgba(114,14,158,0.3); }

/* Color Picker Panel */
.color-panel {
  position: absolute; bottom: 100px; left: 220px;
  background: var(--bg-panel); border: 1px solid var(--border-bright);
  border-radius: 4px; padding: 12px;
  display: none; z-index: 50;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.color-panel.show { display: block; }
.color-swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
.color-swatch {
  width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.15s;
}
.color-swatch:hover, .color-swatch.selected { border-color: white; transform: scale(1.2); }

/* Profile Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; display: none;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-panel); border: 1px solid var(--border-bright);
  border-radius: 4px; padding: 0; width: 440px;
  box-shadow: 0 0 40px rgba(114,14,158,0.4);
  overflow: hidden;
}
.modal-header {
  background: linear-gradient(135deg, var(--yahoo-purple-dark), var(--yahoo-purple));
  padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 15px; font-weight: 700; color: var(--yahoo-yellow); }
.modal-close {
  background: none; border: none; color: white;
  cursor: pointer; font-size: 18px; padding: 0 4px;
}
.modal-body { padding: 20px; }

.avatar-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin: 10px 0; }
.avatar-opt {
  font-size: 24px; padding: 4px; border: 2px solid var(--border);
  border-radius: 4px; cursor: pointer; text-align: center;
  transition: all 0.15s; background: var(--bg-input);
}
.avatar-opt:hover { border-color: var(--yahoo-purple-light); }
.avatar-opt.selected { border-color: var(--yahoo-yellow); background: rgba(255,215,0,0.1); }

/* Create Room Modal */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* DM Tab in sidebar */
.dm-list { flex: 1; overflow-y: auto; }
.dm-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; cursor: pointer;
  border-left: 3px solid transparent; transition: all 0.15s; font-size: 13px;
}
.dm-item:hover { background: rgba(114,14,158,0.2); border-left-color: var(--online-green); }
.dm-item.active { background: rgba(74,255,145,0.1); border-left-color: var(--online-green); color: var(--online-green); }

/* Scrollbars */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--yahoo-purple); }

/* No chat selected */
.no-chat {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text-dim);
}
.no-chat-logo { font-family: 'Press Start 2P', monospace; font-size: 36px; color: var(--yahoo-purple); opacity: 0.4; margin-bottom: 16px; }
.no-chat-text { font-size: 15px; }

/* Notification toast */
.toast {
  position: fixed; top: 70px; right: 20px;
  background: var(--bg-panel); border: 1px solid var(--border-bright);
  border-left: 4px solid var(--yahoo-yellow);
  border-radius: 3px; padding: 12px 16px;
  z-index: 300; max-width: 280px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  animation: slideIn 0.3s ease; font-size: 13px;
}
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.friend-search-results { max-height: 160px; overflow-y: auto; margin-top: 8px; }
.friend-result-item {
  display: flex; align-items: center; gap: 8px; padding: 8px;
  border: 1px solid var(--border); border-radius: 3px; margin-bottom: 4px;
  background: var(--bg-input);
}
.btn-small {
  padding: 4px 10px; font-size: 11px;
  background: linear-gradient(135deg, var(--yahoo-purple), var(--yahoo-purple-light));
  border: none; border-radius: 2px; color: white; cursor: pointer; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
}

/* Ping animation for DM */
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
.has-dm { animation: pulse 1s infinite; }

.input-hidden-color { width: 0; height: 0; opacity: 0; position: absolute; }
</style>
</head>
<body>

<!-- ─── AUTH SCREEN ─────────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-header">
      <div class="yahoo-logo">Yahoo!<span>聊天室</span></div>
      <div class="auth-subtitle">Chat · 與世界連線</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">登入</button>
      <button class="auth-tab" onclick="switchTab('register')">註冊</button>
    </div>
    <div id="login-form" class="auth-form active">
      <div class="form-group"><label>帳號</label><input type="text" id="login-user" placeholder="輸入帳號"></div>
      <div class="form-group"><label>密碼</label><input type="password" id="login-pass" placeholder="輸入密碼"></div>
      <button class="btn-yahoo" onclick="doLogin()">登入聊天室</button>
      <div class="auth-error" id="login-error"></div>
    </div>
    <div id="register-form" class="auth-form">
      <div class="form-group"><label>帳號</label><input type="text" id="reg-user" placeholder="設定帳號"></div>
      <div class="form-group"><label>暱稱</label><input type="text" id="reg-nick" placeholder="顯示暱稱（可不填）"></div>
      <div class="form-group"><label>密碼</label><input type="password" id="reg-pass" placeholder="設定密碼"></div>
      <button class="btn-yahoo" onclick="doRegister()">建立帳號</button>
      <div class="auth-error" id="reg-error"></div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:3000'
  : window.location.origin;

// ─── STATE ────────────────────────────────────────────────────────────────────
let token = localStorage.getItem('yc_token') || null;
let me = null;
let socket = null;
let currentRoom = null;
let currentDM = null;
let msgColor = '#f0e6ff';
let msgBold = false;
let msgItalic = false;
let selectedAvatar = 'cat';
let rooms = [];
let onlineUsers = [];
let dmHistory = {}; // username → messages[]
let roomMessages = {}; // roomName → messages[]
let unreadDMs = {}; // username → count
let typingTimers = {};

const AVATARS = ['😺','🐶','🦊','🐼','🐨','🦁','🐸','🐯','🐙','🦋','🐬','🦄','🐉','🤖','👽','🎃','🧸','🌸','⭐','🔥','💎','🎭','🦅','🐺'];

const EMOJIS = ['😀','😂','🥰','😍','🤩','😎','🤔','😏','😒','😢','😭','😡','🥺','😇','🤗','😴','🤯','🥳','😈','💀','👻','🤡','💩','🙈','🙉','🙊','💕','💖','💗','💙','💚','💛','💜','🖤','❤️','🔥','⭐','✨','💫','🌟','🎉','🎊','🎈','🎁','🏆','🥇','💪','👍','👎','🙌','👏','🤝','✌️','🤞','🤟'];

const KAOMOJIS = ['(≧▽≦)','(^▽^)','(≧ω≦)','(｡♥‿♥｡)','(◕‿◕)','(ノ°▽°)ノ','(￣▽￣)','（╯°□°）╯','(っ◔◡◔)っ','ヽ(✿ﾟ▽ﾟ)ノ','(ง •̀_•́)ง','ᕙ(⇀‸↼‶)ᕗ','(；′⌒`)','(T_T)','(╥_╥)','o(╥﹏╥)o','(─.─||)','(=_=)','(-_-;)','(>_<)','( ˘ ³˘)♥','(づ｡◕‿‿◕｡)づ','ʕ•ᴥ•ʔ','(づ ◕‿◕ )づ','┻━┻ ︵ヽ(`Д´)ﾉ︵ ┻━┻','┬─┬ ノ( ゜-゜ノ)','(/ω＼)','(ノ◕ヮ◕)ノ*:･ﾟ✧'];

const STICKERS = ['🎉','🎊','🎈','🎁','🏆','💎','🔥','⚡','🌈','🦋','🌸','🌺','🍀','🎵','🎶','🎸','🎤','🎮','🕹️','💻','📱','🚀','🛸','🌙','⭐','💫','✨','🌟','❄️','🌊','🎭','🎨'];

const COLORS = ['#f0e6ff','#ff6b6b','#ffd700','#51cf66','#339af0','#cc5de8','#ff922b','#20c997','#f06595','#a9e34b','#74c0fc','#b197fc','#ffffff','#adb5bd','#495057','#212529'];

const STATUS_ICONS = { online:'🟢', away:'🟡', busy:'🔴', invisible:'⚫' };

// ─── API HELPERS ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(API + path, {
    method, headers: { 'Content-Type':'application/json', ...(token ? {'Authorization':'Bearer '+token} : {}) },
    body: body ? JSON.stringify(body) : undefined
  });
  return res.json();
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'?0:1)===i));
  document.getElementById('login-form').classList.toggle('active', tab==='login');
  document.getElementById('register-form').classList.toggle('active', tab==='register');
}

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const res = await api('POST','/api/login',{username,password});
  if (res.error) { document.getElementById('login-error').textContent = res.error; return; }
  token = res.token; me = res.user;
  localStorage.setItem('yc_token', token);
  startApp();
}

async function doRegister() {
  const username = document.getElementById('reg-user').value.trim();
  const nickname = document.getElementById('reg-nick').value.trim();
  const password = document.getElementById('reg-pass').value;
  const res = await api('POST','/api/register',{username,password,nickname});
  if (res.error) { document.getElementById('reg-error').textContent = res.error; return; }
  token = res.token; me = res.user;
  localStorage.setItem('yc_token', token);
  startApp();
}

function doLogout() {
  localStorage.removeItem('yc_token');
  location.reload();
}

// ─── APP INIT ─────────────────────────────────────────────────────────────────
async function startApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  updateTopbar();
  initSocket();
  await loadRooms();
  await loadFriends();
  buildEmojiPanel();
  buildStickerPanel();
  buildColorPanel();
  buildAvatarGrid();
}

function updateTopbar() {
  document.getElementById('tb-avatar').textContent = me.avatar || '😺';
  document.getElementById('tb-username').textContent = me.nickname || me.username;
  const dot = document.getElementById('tb-status-dot');
  const colors = { online: 'var(--online-green)', away: 'var(--away-yellow)', busy: 'var(--busy-red)', invisible: '#666' };
  dot.style.background = colors[me.status] || 'var(--online-green)';
}

// ─── SOCKET.IO ────────────────────────────────────────────────────────────────
function initSocket() {
  socket = io(API, { auth: { token } });

  socket.on('connect', () => console.log('✅ Socket connected'));
  socket.on('connect_error', e => console.error('Socket error:', e.message));

  socket.on('users:online', (users) => {
    onlineUsers = users;
    renderUserList();
  });

  socket.on('user:status', ({ username, status, statusMsg }) => {
    if (username === me.username) { me.status = status; me.statusMsg = statusMsg; }
    renderUserList();
  });

  socket.on('room:new', (room) => {
    if (!rooms.find(r => r.name === room.name)) { rooms.push(room); renderRoomList(); }
  });

  socket.on('room:history', ({ room, messages }) => {
    roomMessages[room] = messages;
    if (currentRoom === room) renderMessages();
  });

  socket.on('message:room', (msg) => {
    if (!roomMessages[msg.room]) roomMessages[msg.room] = [];
    roomMessages[msg.room].push(msg);
    if (currentRoom === msg.room) renderMessages();
  });

  socket.on('message:dm', (msg) => {
    const other = msg.from === me.username ? msg.to : msg.from;
    if (!dmHistory[other]) dmHistory[other] = [];
    dmHistory[other].push(msg);
    if (currentDM === other) renderMessages();
    else if (msg.from !== me.username) {
      unreadDMs[other] = (unreadDMs[other] || 0) + 1;
      renderDMList();
      showToast(`📨 ${other}: ${msg.content.substring(0,40)}`);
    }
  });

  socket.on('typing:room', ({ username, isTyping }) => {
    const el = document.getElementById('typing-indicator');
    if (!el) return;
    if (isTyping) el.textContent = `${username} 正在輸入...`;
    else el.textContent = '';
  });

  socket.on('typing:dm', ({ username, isTyping }) => {
    if (username !== currentDM) return;
    const el = document.getElementById('typing-indicator');
    if (!el) return;
    if (isTyping) el.textContent = `${username} 正在輸入...`;
    else el.textContent = '';
  });
}

// ─── ROOMS ────────────────────────────────────────────────────────────────────
async function loadRooms() {
  const data = await api('GET','/api/rooms');
  rooms = data;
  renderRoomList();
}

function renderRoomList() {
  const el = document.getElementById('room-list');
  const categories = [...new Set(rooms.map(r => r.category))];
  el.innerHTML = '';
  categories.forEach(cat => {
    const catRooms = rooms.filter(r => r.category === cat);
    const catEl = document.createElement('div');
    catEl.innerHTML = `<div style="padding:8px 14px 2px;font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border)">${cat}</div>`;
    catRooms.forEach(room => {
      const div = document.createElement('div');
      div.className = 'room-item' + (currentRoom === room.name ? ' active' : '');
      div.innerHTML = `<span class="room-icon">💬</span><span class="room-name">${room.name}</span>`;
      div.onclick = () => joinRoom(room.name);
      catEl.appendChild(div);
    });
    el.appendChild(catEl);
  });
}

function joinRoom(name) {
  if (currentRoom && currentRoom !== name) socket.emit('room:leave', { room: currentRoom });
  if (currentRoom === name) return;
  currentRoom = name; currentDM = null;
  socket.emit('room:join', { room: name });
  renderRoomList();
  renderDMList();
  openChatArea('room', name);
}

// ─── DM ───────────────────────────────────────────────────────────────────────
let dmUsers = new Set();

function openDM(username) {
  if (currentRoom) { socket.emit('room:leave', { room: currentRoom }); currentRoom = null; }
  currentDM = username;
  dmUsers.add(username);
  unreadDMs[username] = 0;
  renderRoomList();
  renderDMList();
  // Load history
  api('GET', `/api/dm/${username}`).then(msgs => {
    dmHistory[username] = msgs;
    renderMessages();
  });
  openChatArea('dm', username);
}

function renderDMList() {
  const el = document.getElementById('dm-list');
  el.innerHTML = '';
  const totalUnread = Object.values(unreadDMs).reduce((a,b)=>a+b,0);
  const badge = document.getElementById('dm-count');
  badge.textContent = totalUnread || '';
  badge.classList.toggle('show', totalUnread > 0);

  dmUsers.forEach(username => {
    const div = document.createElement('div');
    div.className = 'dm-item' + (currentDM === username ? ' active' : '');
    const isOnline = onlineUsers.includes(username);
    const unread = unreadDMs[username] || 0;
    div.innerHTML = `<span style="font-size:8px;color:${isOnline?'var(--online-green)':'#666'}">●</span><span style="flex:1">${username}</span>${unread?`<span class="room-badge show">${unread}</span>`:''}`;
    div.onclick = () => openDM(username);
    el.appendChild(div);
  });
}

// ─── CHAT AREA ────────────────────────────────────────────────────────────────
function openChatArea(type, name) {
  const area = document.getElementById('chat-area');
  const room = type === 'room' ? rooms.find(r => r.name === name) : null;
  area.innerHTML = `
    <div class="chat-header">
      <span class="chat-room-name">${type==='dm'?'💌 ':''} ${name}</span>
      ${room ? `<span class="chat-room-topic">${room.topic}</span>` : ''}
      <span class="chat-type-badge ${type==='dm'?'badge-dm':'badge-public'}">${type==='dm'?'私訊':'公開'}</span>
    </div>
    <div class="messages-container" id="messages-container"></div>
    <div class="typing-indicator" id="typing-indicator"></div>
    <div class="input-bar">
      <div class="input-toolbar">
        <button class="toolbar-btn" id="btn-bold" onclick="toggleBold()"><b>B</b></button>
        <button class="toolbar-btn" id="btn-italic" onclick="toggleItalic()"><i>I</i></button>
        <button class="toolbar-btn color-picker-btn" onclick="togglePanel('color')">
          <span class="color-dot" id="cur-color-dot" style="background:${msgColor}"></span>顏色
        </button>
        <button class="toolbar-btn" onclick="togglePanel('emoji')">😀 表情</button>
        <button class="toolbar-btn" onclick="togglePanel('sticker')">🎭 貼圖</button>
        ${type==='room'?`<button class="toolbar-btn" onclick="sendEmote()">/me 動作</button>`:''}
      </div>
      <div class="input-row">
        <textarea id="msg-input" rows="1" placeholder="輸入訊息..." onkeydown="handleKey(event)" oninput="handleTyping()"></textarea>
        <button class="btn-send" onclick="sendMessage()">傳送 ▶</button>
      </div>
    </div>
  `;
  renderMessages();
}

function renderMessages() {
  const container = document.getElementById('messages-container');
  if (!container) return;
  const msgs = currentRoom ? (roomMessages[currentRoom]||[]) : (dmHistory[currentDM]||[]);
  container.innerHTML = '';
  msgs.forEach(m => {
    const isMine = m.from === me.username;
    const isSystem = m.type === 'system';
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap' + (isMine ? ' mine' : '');
    const time = new Date(m.timestamp).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    if (!isSystem) {
      wrap.innerHTML += `<div class="msg-meta">
        <span class="msg-username" onclick="onClickUser('${m.from}')">${m.from}</span>
        <span>${time}</span>
      </div>`;
    }
    const bubble = document.createElement('div');
    bubble.className = `msg-bubble ${isSystem?'system':isMine?'mine':'other'} ${m.type==='sticker'?'sticker':''} ${m.type==='emote'?'emote':''}`;
    if (m.color && !isSystem) bubble.style.color = m.color;
    if (m.bold) bubble.style.fontWeight = '700';
    if (m.italic) bubble.style.fontStyle = 'italic';
    bubble.textContent = m.content;
    wrap.appendChild(bubble);
    container.appendChild(wrap);
  });
  container.scrollTop = container.scrollHeight;
}

// ─── SEND ─────────────────────────────────────────────────────────────────────
function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content) return;
  if (currentRoom) {
    socket.emit('message:room', { room: currentRoom, content, type:'text', color:msgColor, bold:msgBold, italic:msgItalic });
    socket.emit('typing:room', { room: currentRoom, isTyping: false });
  } else if (currentDM) {
    socket.emit('message:dm', { to: currentDM, content, type:'text', color:msgColor, bold:msgBold, italic:msgItalic });
    socket.emit('typing:dm', { to: currentDM, isTyping: false });
  }
  input.value = '';
  input.style.height = 'auto';
  closeAllPanels();
}

function sendEmote() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim() || '做了某件事';
  if (!currentRoom) return;
  socket.emit('message:room', { room: currentRoom, content: `${me.nickname||me.username} ${content}`, type:'emote', color: '#9B40C8' });
  input.value = '';
}

function sendSticker(s) {
  if (currentRoom) socket.emit('message:room', { room: currentRoom, content: s, type:'sticker' });
  else if (currentDM) socket.emit('message:dm', { to: currentDM, content: s, type:'sticker' });
  closeAllPanels();
}

function insertEmoji(e) {
  const input = document.getElementById('msg-input');
  input.value += e; input.focus();
  closeAllPanels();
}

// ─── TYPING ───────────────────────────────────────────────────────────────────
function handleTyping() {
  const input = document.getElementById('msg-input');
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  if (currentRoom) socket.emit('typing:room', { room: currentRoom, isTyping: true });
  else if (currentDM) socket.emit('typing:dm', { to: currentDM, isTyping: true });
  clearTimeout(typingTimers.main);
  typingTimers.main = setTimeout(() => {
    if (currentRoom) socket.emit('typing:room', { room: currentRoom, isTyping: false });
    else if (currentDM) socket.emit('typing:dm', { to: currentDM, isTyping: false });
  }, 2000);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ─── USERS ────────────────────────────────────────────────────────────────────
function renderUserList() {
  const el = document.getElementById('user-list');
  el.innerHTML = '';
  const sorted = [...onlineUsers].filter(u => u !== me.username);
  sorted.forEach(username => {
    const div = document.createElement('div');
    div.className = 'user-item';
    div.innerHTML = `<span class="user-avatar-sm">😺</span><div class="user-info-sm"><div class="user-name-sm">${username}</div><div class="user-status-sm">線上</div></div><span class="user-status-dot status-online"></span>`;
    div.onclick = () => onClickUser(username);
    el.appendChild(div);
  });
}

function onClickUser(username) {
  if (username === me.username || username === 'System') return;
  if (confirm(`開啟與 ${username} 的私訊？`)) openDM(username);
}

// ─── TOOLBAR ─────────────────────────────────────────────────────────────────
function toggleBold() {
  msgBold = !msgBold;
  document.getElementById('btn-bold').classList.toggle('active', msgBold);
}
function toggleItalic() {
  msgItalic = !msgItalic;
  document.getElementById('btn-italic').classList.toggle('active', msgItalic);
}
function setColor(c) {
  msgColor = c;
  const dot = document.getElementById('cur-color-dot');
  if (dot) dot.style.background = c;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('selected', s.dataset.color===c));
  closeAllPanels();
}

function togglePanel(name) {
  const panels = { emoji:'emoji-panel', sticker:'sticker-panel', color:'color-panel' };
  const target = document.getElementById(panels[name]);
  const isShown = target.classList.contains('show');
  closeAllPanels();
  if (!isShown) target.classList.add('show');
}
function closeAllPanels() {
  ['emoji-panel','sticker-panel','color-panel'].forEach(id => document.getElementById(id).classList.remove('show'));
}
document.addEventListener('click', e => {
  if (!e.target.closest('.emoji-panel') && !e.target.closest('[onclick*="emoji"]') &&
      !e.target.closest('.sticker-panel') && !e.target.closest('[onclick*="sticker"]') &&
      !e.target.closest('.color-panel') && !e.target.closest('[onclick*="color"]')) closeAllPanels();
});

// ─── PANELS BUILD ─────────────────────────────────────────────────────────────
function buildEmojiPanel() {
  const grid = document.getElementById('emoji-grid');
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn'; btn.textContent = e;
    btn.onclick = () => insertEmoji(e);
    grid.appendChild(btn);
  });
}
function switchEmojiTab(type, btn) {
  document.querySelectorAll('.emoji-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  const list = type === 'emoji' ? EMOJIS : KAOMOJIS;
  list.forEach(e => {
    const b = document.createElement('button');
    b.className = 'emoji-btn'; b.textContent = e;
    b.style.fontSize = type === 'kaomoji' ? '11px' : '22px';
    b.onclick = () => insertEmoji(e);
    grid.appendChild(b);
  });
}
function buildStickerPanel() {
  const grid = document.getElementById('sticker-grid');
  STICKERS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sticker-btn'; btn.textContent = s;
    btn.onclick = () => sendSticker(s);
    grid.appendChild(btn);
  });
}
function buildColorPanel() {
  const el = document.getElementById('color-swatches');
  COLORS.forEach(c => {
    const div = document.createElement('div');
    div.className = 'color-swatch'; div.style.background = c; div.dataset.color = c;
    div.onclick = () => setColor(c);
    el.appendChild(div);
  });
}
function buildAvatarGrid() {
  const grid = document.getElementById('avatar-grid');
  grid.innerHTML = '';
  AVATARS.forEach(a => {
    const div = document.createElement('div');
    div.className = 'avatar-opt' + (a === (me.avatar||'😺') ? ' selected' : '');
    div.textContent = a;
    div.onclick = () => {
      document.querySelectorAll('.avatar-opt').forEach(x=>x.classList.remove('selected'));
      div.classList.add('selected');
      selectedAvatar = a;
    };
    grid.appendChild(div);
  });
}

// ─── PROFILE ──────────────────────────────────────────────────────────────────
function openModal(id) {
  if (id === 'profile-modal') {
    document.getElementById('p-nickname').value = me.nickname || '';
    document.getElementById('p-status').value = me.status || 'online';
    document.getElementById('p-statusMsg').value = me.statusMsg || '';
    selectedAvatar = me.avatar || '😺';
    buildAvatarGrid();
  }
  if (id === 'friend-modal') loadFriends();
  document.getElementById(id).classList.add('show');
}
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

async function saveProfile() {
  const nickname = document.getElementById('p-nickname').value.trim();
  const status = document.getElementById('p-status').value;
  const statusMsg = document.getElementById('p-statusMsg').value.trim();
  const res = await api('PUT','/api/me',{ nickname, avatar: selectedAvatar, status, statusMsg });
  me = { ...me, ...res };
  updateTopbar();
  socket.emit('user:status', { status, statusMsg });
  closeModal('profile-modal');
  showToast('✅ 個人資料已更新');
}

// ─── FRIENDS ──────────────────────────────────────────────────────────────────
async function loadFriends() {
  const data = await api('GET','/api/friends');
  renderFriends(data);
}
function renderFriends({ friends, requests }) {
  const reqEl = document.getElementById('friend-requests');
  const listEl = document.getElementById('friends-list');
  if (!reqEl || !listEl) return;
  reqEl.innerHTML = requests.length ? requests.map(u => `
    <div class="friend-result-item">
      <span style="flex:1">😺 ${u}</span>
      <button class="btn-small" onclick="acceptFriend('${u}')">接受</button>
    </div>`).join('') : '<div style="color:var(--text-dim);font-size:12px">暫無好友請求</div>';
  listEl.innerHTML = friends.length ? friends.map(u => `
    <div class="friend-result-item">
      <span style="flex:1;font-size:12px">😺 ${u}</span>
      <span style="font-size:10px;color:${onlineUsers.includes(u)?'var(--online-green)':'#666'}">${onlineUsers.includes(u)?'線上':'離線'}</span>
      <button class="btn-small" onclick="openDM('${u}');closeModal('friend-modal')">私訊</button>
    </div>`).join('') : '<div style="color:var(--text-dim);font-size:12px">還沒有好友，去搜尋新朋友吧！</div>';
}

async function searchUsers() {
  const q = document.getElementById('friend-search').value.trim();
  if (!q) return;
  const users = await api('GET', `/api/users/search?q=${q}`);
  const el = document.getElementById('friend-search-results');
  el.innerHTML = users.map(u => u.username !== me.username ? `
    <div class="friend-result-item">
      <span style="flex:1;font-size:13px">${u.avatar||'😺'} ${u.nickname||u.username} <span style="color:var(--text-dim);font-size:11px">@${u.username}</span></span>
      <button class="btn-small" onclick="addFriend('${u.username}')">加好友</button>
    </div>` : '').join('');
}

async function addFriend(username) {
  await api('POST','/api/friends/request',{username});
  showToast(`✅ 已傳送好友邀請給 ${username}`);
}
async function acceptFriend(username) {
  await api('POST','/api/friends/accept',{username});
  await loadFriends();
  showToast(`✅ 已新增 ${username} 為好友`);
}

// ─── CREATE ROOM ──────────────────────────────────────────────────────────────
async function createRoom() {
  const name = document.getElementById('new-room-name').value.trim();
  const category = document.getElementById('new-room-cat').value;
  const topic = document.getElementById('new-room-topic').value.trim();
  if (!name) return;
  const res = await api('POST','/api/rooms',{name,category,topic});
  if (res.error) { showToast('❌ '+res.error); return; }
  closeModal('create-room-modal');
  joinRoom(name);
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ─── AUTO LOGIN ───────────────────────────────────────────────────────────────
(async () => {
  if (token) {
    const res = await api('GET','/api/me');
    if (!res.error) { me = res; startApp(); }
    else { localStorage.removeItem('yc_token'); token = null; }
  }
})();
</script>
</body>
</html>
