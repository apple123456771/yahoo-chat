<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yahoo! 聊天室</title>  
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root{--yp:#720E9E;--ypd:#4A0066;--ypl:#9B40C8;--yy:#FFD700;--bg:#1a0a2e;--panel:#12071f;--card:#1e0d35;--inp:#0f0520;--bdr:#3d1a5c;--bdrb:#6b35a0;--tx:#f0e6ff;--txs:#b08fd0;--txd:#7a5a99;--grn:#4AFF91;--red:#FF5555;--mine:#2d0f4a;--other:#1a0833}
body.light{--bg:#f5eeff;--panel:#ede0ff;--card:#f8f0ff;--inp:#fff;--bdr:#c9a0e8;--bdrb:#9b40c8;--tx:#2d0a4a;--txs:#5a1a8a;--txd:#8a5aaa;--mine:#d4b0ff;--other:#ede0ff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden}
#auth{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.abox{width:420px;background:var(--panel);border:1px solid var(--bdrb);border-radius:4px;overflow:hidden;box-shadow:0 0 60px rgba(114,14,158,.4)}
.ahdr{background:linear-gradient(135deg,var(--ypd),var(--yp),var(--ypl));padding:28px 32px;text-align:center}
.logo{font-family:'Press Start 2P',monospace;font-size:26px;color:var(--yy)}
.logo span{color:#fff}
.asub{font-size:12px;color:rgba(255,255,255,.7);margin-top:6px;letter-spacing:2px}
.atabs{display:flex;border-bottom:1px solid var(--bdr)}
.atab{flex:1;padding:14px;background:none;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:700;color:var(--txd);border-bottom:2px solid transparent}
.atab.on{color:var(--yy);border-bottom-color:var(--yy)}
.aform{padding:28px 32px;display:none}
.aform.on{display:block}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;color:var(--txs);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
.fg input,.fg select{width:100%;padding:10px 14px;background:var(--inp);border:1px solid var(--bdr);border-radius:3px;color:var(--tx);font-family:'Noto Sans TC',sans-serif;font-size:14px;outline:none}
.fg input:focus{border-color:var(--ypl)}
.by{width:100%;padding:12px;background:linear-gradient(135deg,var(--yp),var(--ypl));border:none;border-radius:3px;color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.aerr{color:#ff6b6b;font-size:13px;margin-top:10px;text-align:center}
#app{display:none;height:100vh;flex-direction:column}
#app.on{display:flex}
.top{height:52px;min-height:52px;background:linear-gradient(90deg,var(--ypd),var(--yp),var(--ypl));display:flex;align-items:center;padding:0 16px;gap:10px;border-bottom:2px solid var(--yy);z-index:10}
.tlogo{font-family:'Press Start 2P',monospace;font-size:16px;color:var(--yy);flex-shrink:0}
.tlogo span{color:#fff;font-size:11px;margin-left:6px;font-family:'Noto Sans TC',sans-serif;font-weight:400}
.sp{flex:1}
.brw{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 10px}
#brs{width:70px;height:4px;accent-color:var(--yy);cursor:pointer}
.thw{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 10px;cursor:pointer}
.thtr{width:36px;height:18px;background:rgba(0,0,0,.3);border-radius:9px;position:relative;border:1px solid rgba(255,255,255,.2)}
.thth{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:1px;left:1px;transition:transform .3s;font-size:9px;line-height:14px;text-align:center}
body.light .thth{transform:translateX(18px)}
.thlb{font-size:11px;color:#fff;font-weight:700}
.tbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:3px;padding:5px 12px;color:#fff;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:700;position:relative}
.tbtn:hover{background:rgba(255,255,255,.25)}
.tbadge{position:absolute;top:-6px;right:-6px;background:var(--yy);color:#000;border-radius:10px;font-size:9px;padding:1px 5px;font-weight:700;display:none}
.tbadge.on{display:inline}
.tusr{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.2);border-radius:20px;padding:4px 12px 4px 4px;cursor:pointer;border:1px solid rgba(255,255,255,.15)}
.tav{width:28px;height:28px;border-radius:50%;font-size:18px;line-height:28px;text-align:center}
.tnm{font-size:13px;font-weight:700;color:#fff}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--grn)}
.main{display:flex;flex:1;overflow:hidden}
.sl{width:220px;min-width:220px;background:var(--panel);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sr{width:190px;min-width:190px;background:var(--panel);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sh{padding:10px 14px 6px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txd);font-weight:700;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.addbtn{background:none;border:none;color:var(--yy);cursor:pointer;font-size:16px;line-height:1}
.rl{overflow-y:auto}
.ri{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;font-size:13px}
.ri:hover{background:rgba(114,14,158,.2);border-left-color:var(--ypl)}
.ri.on{background:rgba(114,14,158,.35);border-left-color:var(--yy);color:var(--yy)}
.ul{flex:1;overflow-y:auto;padding:4px 0}
.ui{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:13px}
.ui:hover{background:rgba(114,14,158,.2)}
.udot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--grn)}
.ca{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--card)}
.ch{padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-shrink:0}
.cn{font-size:16px;font-weight:700;color:var(--yy)}
.ct{font-size:12px;color:var(--txd)}
.cb{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.cbp{background:rgba(114,14,158,.4);color:var(--ypl);border:1px solid var(--yp)}
.cbd{background:rgba(74,255,145,.15);color:var(--grn);border:1px solid rgba(74,255,145,.3)}
.ub{background:rgba(255,215,0,.12);border-bottom:1px solid rgba(255,215,0,.25);padding:6px 14px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--yy);flex-shrink:0}
.uc{background:var(--yy);color:#000;border-radius:10px;font-size:10px;padding:1px 8px;font-weight:700}
.uclr{margin-left:auto;font-size:11px;color:var(--txd);cursor:pointer;text-decoration:underline}
.msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:2px}
.mw{display:flex;flex-direction:column}
.mw.me{align-items:flex-end}
.mm{font-size:10px;color:var(--txd);padding:0 4px;margin-bottom:2px;display:flex;gap:6px}
.mw.me .mm{flex-direction:row-reverse}
.mu{color:var(--ypl);font-weight:700;cursor:pointer}
.mu:hover{color:var(--yy)}
.bbl{max-width:70%;padding:8px 12px;border-radius:2px;font-size:14px;line-height:1.5;word-break:break-word;border-left:3px solid transparent;color:var(--tx)}
.bbl.ot{background:var(--other);border-left-color:var(--yp);color:var(--tx)}
.bbl.my{background:var(--mine);border-left-color:var(--yy);color:var(--tx)}
body.light .bbl.ot,body.light .bbl.my{color:#2d0a4a !important}
body.light .msgs{color:#2d0a4a}
body.light #mi{color:#2d0a4a;background:#fff}
body.light .ca{background:#f8f0ff}
.bbl.sy{background:none;border:none;color:var(--txd);font-style:italic;font-size:12px;text-align:center;width:100%;max-width:100%;padding:4px 0}
.bbl.stk{background:none;border:none;font-size:48px;padding:4px}
.bbl.emt{color:var(--ypl);font-style:italic;background:none;border-color:transparent}
.udiv{display:flex;align-items:center;gap:8px;margin:8px 0}
.udiv::before,.udiv::after{content:'';flex:1;height:1px;background:var(--yy);opacity:.3}
.udiv span{font-size:10px;color:var(--yy);opacity:.8;white-space:nowrap}
.typ{padding:6px 16px;font-size:12px;color:var(--txd);font-style:italic;min-height:26px;flex-shrink:0}
.ib{background:var(--panel);border-top:1px solid var(--bdr);flex-shrink:0}
.itb{padding:6px 12px;display:flex;gap:4px;align-items:center;border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.itbtn{background:none;border:1px solid var(--bdr);border-radius:2px;padding:3px 7px;color:var(--txs);cursor:pointer;font-size:12px;font-family:'Noto Sans TC',sans-serif}
.itbtn:hover{background:rgba(114,14,158,.3);border-color:var(--ypl);color:var(--tx)}
.itbtn.on{background:rgba(114,14,158,.5);border-color:var(--yy);color:var(--yy)}
.cdot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(255,255,255,.3);display:inline-block;margin-right:3px;vertical-align:middle}
.ir{display:flex;gap:10px;padding:10px 12px;align-items:flex-end}
#mi{flex:1;padding:9px 12px;background:var(--inp);border:1px solid var(--bdr);border-radius:3px;color:var(--tx);font-family:'Noto Sans TC',sans-serif;font-size:14px;outline:none;resize:none;max-height:100px;min-height:38px;line-height:1.4}
#mi:focus{border-color:var(--ypl)}
.bsend{padding:9px 20px;background:linear-gradient(135deg,var(--yp),var(--ypl));border:none;border-radius:3px;color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.fp{position:fixed;bottom:110px;left:240px;background:var(--panel);border:1px solid var(--bdrb);border-radius:4px;padding:10px;display:none;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.fp.on{display:block}
.eg{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-height:200px;overflow-y:auto;width:300px}
.eb{font-size:22px;padding:4px;border:none;background:none;cursor:pointer;border-radius:3px;line-height:1}
.eb:hover{background:rgba(114,14,158,.3)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:260px}
.sb{font-size:40px;padding:8px;border:1px solid var(--bdr);background:var(--card);cursor:pointer;border-radius:4px;line-height:1;text-align:center}
.sb:hover{border-color:var(--yy);transform:scale(1.05)}
.cs{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.csw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.csw:hover,.csw.on{border-color:#fff;transform:scale(1.2)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200}
.mo.on{display:flex}
.md{background:var(--panel);border:1px solid var(--bdrb);border-radius:4px;width:480px;box-shadow:0 0 40px rgba(114,14,158,.4);overflow:hidden;max-height:90vh;display:flex;flex-direction:column}
.mh{background:linear-gradient(135deg,var(--ypd),var(--yp));padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mt{font-size:15px;font-weight:700;color:var(--yy)}
.mc{background:none;border:none;color:#fff;cursor:pointer;font-size:18px;padding:0 4px}
.mb{padding:20px;overflow-y:auto}
.ag{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin:10px 0}
.ao{font-size:24px;padding:4px;border:2px solid var(--bdr);border-radius:4px;cursor:pointer;text-align:center;background:var(--inp)}
.ao:hover{border-color:var(--ypl)}
.ao.on{border-color:var(--yy);background:rgba(255,215,0,.1)}
.fsr{max-height:200px;overflow-y:auto;margin-top:8px}
.fi{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--bdr);border-radius:3px;margin-bottom:4px;background:var(--inp)}
.bsm{padding:4px 10px;font-size:11px;background:linear-gradient(135deg,var(--yp),var(--ypl));border:none;border-radius:2px;color:#fff;cursor:pointer;font-weight:700;font-family:'Noto Sans TC',sans-serif;white-space:nowrap}
.bsm:hover{opacity:.85}
.dl{overflow-y:auto}
.di{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;border-left:3px solid transparent;font-size:13px}
.di:hover{background:rgba(114,14,158,.2);border-left-color:var(--grn)}
.di.on{background:rgba(74,255,145,.1);border-left-color:var(--grn);color:var(--grn)}
.rbdg{background:var(--yy);color:#000;border-radius:10px;font-size:10px;padding:1px 5px;font-weight:700}
.nc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txd)}
.ncl{font-family:'Press Start 2P',monospace;font-size:36px;color:var(--yp);opacity:.4;margin-bottom:16px}
.toast{position:fixed;top:70px;right:20px;background:var(--panel);border:1px solid var(--bdrb);border-left:4px solid var(--yy);border-radius:3px;padding:12px 16px;z-index:300;max-width:280px;box-shadow:0 4px 20px rgba(0,0,0,.5);font-size:13px;animation:si .3s ease}
@keyframes si{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.slb{font-size:11px;color:var(--txd);letter-spacing:1px;text-transform:uppercase;margin:12px 0 6px;font-weight:700}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#4d1f75;border-radius:3px}
</style>
</head>
<body>
<div id="auth">
  <div class="abox">
    <div class="ahdr">
      <div class="logo">Yahoo!<span>聊天室</span></div>
      <div class="asub">CHAT · 與世界連線</div>
    </div>
    <div class="atabs">
      <button class="atab on" id="tab-login" onclick="switchTab('login')">登入</button>
      <button class="atab" id="tab-reg" onclick="switchTab('reg')">註冊</button>
    </div>
    <div class="aform on" id="form-login">
      <div class="fg"><label>帳號</label><input type="text" id="lu" placeholder="輸入帳號"></div>
      <div class="fg"><label>密碼</label><input type="password" id="lp" placeholder="輸入密碼"></div>
      <button class="by" id="btn-login">登入聊天室</button>
      <div class="aerr" id="lerr"></div>
    </div>
    <div class="aform" id="form-reg">
      <div class="fg"><label>帳號</label><input type="text" id="ru" placeholder="設定帳號"></div>
      <div class="fg"><label>暱稱</label><input type="text" id="rn" placeholder="顯示暱稱（可不填）"></div>
      <div class="fg"><label>密碼</label><input type="password" id="rp" placeholder="設定密碼"></div>
      <button class="by" id="btn-reg">建立帳號</button>
      <div class="aerr" id="rerr"></div>
    </div>
  </div>
</div>
<div id="app">
  <div class="top">
    <div class="tlogo">Y!<span>聊天室</span></div>
    <div class="sp"></div>
    <div class="brw"><span>🌙</span><input type="range" id="brs" min="50" max="150" value="100" oninput="setBr(this.value)"><span>☀️</span></div>
    <div class="thw" onclick="toggleTheme()">
      <div class="thtr"><div class="thth" id="thth">🌙</div></div>
      <span class="thlb" id="thlb">暗色</span>
    </div>
    <button class="tbtn" id="btn-friends">👥 好友<span class="tbadge" id="frbdg"></span></button>
    <button class="tbtn" id="btn-settings">⚙️ 設定</button>
    <div class="tusr" id="btn-profile">
      <div class="tav" id="tav">😺</div>
      <div class="tnm" id="tnm">載入中...</div>
      <div class="sdot" id="tdot"></div>
    </div>
    <button class="tbtn" id="btn-logout">登出</button>
  </div>
  <div class="main">
    <div class="sl">
      <div class="sh">聊天室<button class="addbtn" id="btn-addroom">＋</button></div>
      <div class="rl" id="rl"></div>
      <div class="sh" style="margin-top:auto">私訊</div>
      <div class="dl" id="dl"></div>
    </div>
    <div class="ca" id="ca">
      <div class="nc"><div class="ncl">Y!</div><div>選擇聊天室或私訊開始聊天</div></div>
    </div>
    <div class="sr">
      <div class="sh">線上用戶</div>
      <div class="ul" id="ul"></div>
    </div>
  </div>
</div>
<div class="fp" id="ep"><div style="display:flex;gap:4px;margin-bottom:8px"><button class="itbtn on" onclick="switchET('e',this)">表情</button><button class="itbtn" onclick="switchET('k',this)">顏文字</button></div><div class="eg" id="eg"></div></div>
<div class="fp" id="sp"><div class="slb">貼圖</div><div class="sg" id="sg2"></div></div>
<div class="fp" id="cp"><div class="slb">字體顏色</div><div class="cs" id="cs"></div></div>
<div class="mo" id="mo-profile">
  <div class="md">
    <div class="mh"><span class="mt">⚙️ 個人設定</span><button class="mc" id="mc-profile">✕</button></div>
    <div class="mb">
      <div class="fg"><label>暱稱</label><input type="text" id="pnick" placeholder="顯示暱稱"></div>
      <div class="fg"><label>狀態</label><select id="pstat"><option value="online">🟢 線上</option><option value="away">🟡 離開中</option><option value="busy">🔴 忙碌中</option><option value="invisible">⚫ 隱身</option></select></div>
      <div class="fg"><label>狀態訊息</label><input type="text" id="psmsg" placeholder="說說你在做什麼..."></div>
      <div class="fg"><label>選擇頭像</label><div class="ag" id="ag"></div></div>
      <button class="by" id="btn-saveprofile">儲存設定</button>
    </div>
  </div>
</div>
<div class="mo" id="mo-friends">
  <div class="md">
    <div class="mh"><span class="mt">👥 好友名單</span><button class="mc" id="mc-friends">✕</button></div>
    <div class="mb">
      <div class="slb">搜尋並新增好友</div>
      <div style="display:flex;gap:8px;margin-bottom:6px">
        <input type="text" id="fsrch" placeholder="輸入帳號搜尋..." style="flex:1;padding:8px 12px;background:var(--inp);border:1px solid var(--bdr);border-radius:3px;color:var(--tx);font-family:inherit;font-size:13px;outline:none">
        <button class="bsm" id="btn-search">🔍 搜尋</button>
      </div>
      <div class="fsr" id="fsr"></div>
      <div class="slb">好友請求</div>
      <div id="freq"><div style="color:var(--txd);font-size:12px">暫無好友請求</div></div>
      <div class="slb">好友列表</div>
      <div id="flist"><div style="color:var(--txd);font-size:12px">還沒有好友，去搜尋新朋友吧！</div></div>
    </div>
  </div>
</div>
<div class="mo" id="mo-room">
  <div class="md">
    <div class="mh"><span class="mt">＋ 建立聊天室</span><button class="mc" id="mc-room">✕</button></div>
    <div class="mb">
      <div class="fr"><div class="fg"><label>聊天室名稱</label><input type="text" id="nrn" placeholder="輸入名稱"></div><div class="fg"><label>分類</label><select id="nrc"><option>一般</option><option>娛樂</option><option>生活</option><option>學習</option><option>其他</option></select></div></div>
      <div class="fg"><label>主題描述</label><input type="text" id="nrt" placeholder="聊天室主題（選填）"></div>
      <button class="by" id="btn-createroom">建立聊天室</button>
    </div>
  </div>
</div>
<script>
var API=window.location.origin;
var token=localStorage.getItem('yc_token')||null;
var me=null,socket=null;
var curRoom=null,curDM=null;
var msgColor='#f0e6ff',msgBold=false,msgItalic=false,msgFontSize='14px';
var selAva='😺';
var rooms=[],onlineUsers=[];
var dmHist={},roomMsgs={};
var unreadDMs={},unreadRooms={};
var dmUsers=new Set();
var typTimers={};
var isLight=localStorage.getItem('yc_theme')==='light';

function applyTheme(){
  document.body.classList.toggle('light',isLight);
  var t=document.getElementById('thth'),l=document.getElementById('thlb');
  if(t)t.textContent=isLight?'☀️':'🌙';
  if(l)l.textContent=isLight?'亮色':'暗色';
}
function toggleTheme(){isLight=!isLight;localStorage.setItem('yc_theme',isLight?'light':'dark');applyTheme();}
function setBr(v){document.documentElement.style.filter='brightness('+v+'%)';localStorage.setItem('yc_br',v);}
applyTheme();
var sbr=localStorage.getItem('yc_br');
if(sbr)document.documentElement.style.filter='brightness('+sbr+'%)';

function callApi(method,path,body){
  return fetch(API+path,{method:method,headers:{'Content-Type':'application/json',Authorization:token?'Bearer '+token:''},body:body?JSON.stringify(body):undefined}).then(function(r){return r.json();});
}

  document.getElementById('tab-reg').classList.toggle('on',t==='reg');
  document.getElementById('form-login').classList.toggle('on',t==='login');
  document.getElementById('form-reg').classList.toggle('on',t==='reg');
}

function openModal(id){
  if(id==='mo-profile'){
    document.getElementById('pnick').value=me.nickname||'';
    document.getElementById('pstat').value=me.status||'online';
    document.getElementById('psmsg').value=me.statusMsg||'';
    selAva=me.avatar||'😺';buildAvaGrid();
  }
  document.getElementById(id).classList.add('on');
}
function closeModal(id){document.getElementById(id).classList.remove('on');}

function startApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').classList.add('on');
  updateTopbar();initSocket();
  callApi('GET','/api/rooms').then(function(r){rooms=r;renderRoomList();});
  buildEPanel();buildSPanel();buildCPanel();buildAvaGrid();
  var sb=localStorage.getItem('yc_br');
  if(sb)document.getElementById('brs').value=sb;
}

function updateTopbar(){
  document.getElementById('tav').textContent=me.avatar||'😺';
  document.getElementById('tnm').textContent=me.nickname||me.username;
  var colors={online:'var(--grn)',away:'var(--yy)',busy:'var(--red)',invisible:'#666'};
  document.getElementById('tdot').style.background=colors[me.status]||'var(--grn)';
}

function initSocket(){
  socket=io(API,{auth:{token:token}});
  socket.on('users:online',function(u){onlineUsers=u;renderUserList();});
  socket.on('user:status',function(d){if(d.username===me.username){me.status=d.status;me.statusMsg=d.statusMsg;}renderUserList();});
  socket.on('room:new',function(r){if(!rooms.find(function(x){return x.name===r.name;})){rooms.push(r);renderRoomList();}});
  socket.on('room:history',function(d){roomMsgs[d.room]=d.messages;if(curRoom===d.room)renderMessages();});
  socket.on('message:room',function(msg){
    if(!roomMsgs[msg.room])roomMsgs[msg.room]=[];
    roomMsgs[msg.room].push(msg);
    if(curRoom===msg.room)renderMessages();
    else if(msg.type!=='system'){unreadRooms[msg.room]=(unreadRooms[msg.room]||0)+1;renderRoomList();}
  });
  socket.on('message:dm',function(msg){
    var other=msg.from===me.username?msg.to:msg.from;
    if(!dmHist[other])dmHist[other]=[];
    dmHist[other].push(msg);
    if(curDM===other)renderMessages();
    else if(msg.from!==me.username){unreadDMs[other]=(unreadDMs[other]||0)+1;dmUsers.add(other);renderDMList();showToast('📨 '+other+': '+msg.content.substring(0,40));}
  });
  socket.on('typing:room',function(d){var e=document.getElementById('typ-ind');if(e)e.textContent=d.isTyping?d.username+' 正在輸入...':'';});
  socket.on('typing:dm',function(d){if(d.username!==curDM)return;var e=document.getElementById('typ-ind');if(e)e.textContent=d.isTyping?d.username+' 正在輸入...':'';});
}

function renderRoomList(){
  var el=document.getElementById('rl');
  var cats=[];
  rooms.forEach(function(r){if(cats.indexOf(r.category)<0)cats.push(r.category);});
  el.innerHTML='';
  cats.forEach(function(cat){
    var ce=document.createElement('div');
    ce.innerHTML='<div style="padding:8px 14px 2px;font-size:10px;color:var(--txd);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--bdr)">'+cat+'</div>';
    rooms.filter(function(r){return r.category===cat;}).forEach(function(room){
      var d=document.createElement('div');
      d.className='ri'+(curRoom===room.name?' on':'');
      var u=unreadRooms[room.name]||0;
      d.innerHTML='<span>💬</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+room.name+'</span>'+(u?'<span class="rbdg">'+u+'</span>':'');
      d.onclick=function(){joinRoom(room.name);};
      ce.appendChild(d);
    });
    el.appendChild(ce);
  });
}

function joinRoom(name){
  if(curRoom&&curRoom!==name)socket.emit('room:leave',{room:curRoom});
  curRoom=name;curDM=null;unreadRooms[name]=0;
  socket.emit('room:join',{room:name});
  renderRoomList();renderDMList();openChatArea('room',name);
}

function openDM(username){
  if(curRoom){socket.emit('room:leave',{room:curRoom});curRoom=null;}
  curDM=username;dmUsers.add(username);unreadDMs[username]=0;
  renderRoomList();renderDMList();
  callApi('GET','/api/dm/'+username).then(function(msgs){dmHist[username]=msgs;renderMessages();});
  openChatArea('dm',username);
}

function renderDMList(){
  var el=document.getElementById('dl');el.innerHTML='';
  var total=0;
  dmUsers.forEach(function(u){total+=(unreadDMs[u]||0);});
  var fb=document.getElementById('frbdg');
  if(fb){fb.textContent=total||'';fb.classList.toggle('on',total>0);}
  dmUsers.forEach(function(username){
    var d=document.createElement('div');
    d.className='di'+(curDM===username?' on':'');
    var u=unreadDMs[username]||0;
    var online=onlineUsers.indexOf(username)>=0;
    d.innerHTML='<span style="font-size:8px;color:'+(online?'var(--grn)':'#666')+'">●</span><span style="flex:1">'+username+'</span>'+(u?'<span class="rbdg">'+u+'</span>':'');
    d.onclick=function(){openDM(username);};
    el.appendChild(d);
  });
}

function openChatArea(type,name){
  var area=document.getElementById('ca');
  var room=type==='room'?rooms.find(function(r){return r.name===name;}):null;
  area.innerHTML='<div class="ch"><span class="cn">'+(type==='dm'?'💌 ':'')+name+'</span>'+(room?'<span class="ct">'+room.topic+'</span>':'')+'<span class="cb '+(type==='dm'?'cbd':'cbp')+'">'+(type==='dm'?'私訊':'公開')+'</span></div><div class="ub" id="ub" style="display:none"><span>🔔 你有</span><span class="uc" id="uc">0</span><span>則未讀訊息</span><span class="uclr" id="uclr">全部標為已讀</span></div><div class="msgs" id="msgs"></div><div class="typ" id="typ-ind"></div><div class="ib"><div class="itb"><button class="itbtn" id="bbold">B</button><button class="itbtn" id="bital">I</button><select id="bfont" style="background:var(--inp);border:1px solid var(--bdr);border-radius:2px;color:var(--tx);font-family:inherit;font-size:11px;padding:2px 4px;cursor:pointer"><option value="12px">小</option><option value="14px" selected>中</option><option value="18px">大</option><option value="22px">特大</option></select><button class="itbtn" id="bcolor"><span class="cdot" id="curdot" style="background:'+msgColor+'"></span>顏色</button><button class="itbtn" id="bemoji">😀 表情</button><button class="itbtn" id="bsticker">🎭 貼圖</button></div><div class="ir"><textarea id="mi" rows="1" placeholder="輸入訊息..."></textarea><button class="bsend" id="bsend">傳送 ▶</button></div></div>';
  document.getElementById('bbold').addEventListener('click',toggleBold);
  document.getElementById('bfont').addEventListener('change',function(){msgFontSize=this.value;});
  document.getElementById('bital').addEventListener('click',toggleItal);
  document.getElementById('bcolor').addEventListener('click',function(){togglePanel('cp');});
  document.getElementById('bemoji').addEventListener('click',function(){togglePanel('ep');});
  document.getElementById('bsticker').addEventListener('click',function(){togglePanel('sp');});
  document.getElementById('bsend').addEventListener('click',sendMsg);
  document.getElementById('uclr').addEventListener('click',markAllRead);
  document.getElementById('mi').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
  document.getElementById('mi').addEventListener('input',handleTyping);
  renderMessages();
}

function renderMessages(){
  var container=document.getElementById('msgs');
  if(!container)return;
  var msgs=curRoom?(roomMsgs[curRoom]||[]):(dmHist[curDM]||[]);
  var unread=curRoom?(unreadRooms[curRoom]||0):(unreadDMs[curDM]||0);
  var unreadStart=unread>0?msgs.length-unread:-1;
  container.innerHTML='';
  msgs.forEach(function(m,i){
    if(i===unreadStart){
      var div=document.createElement('div');div.className='udiv';
      div.innerHTML='<span>以下為未讀訊息 ('+unread+' 則)</span>';
      container.appendChild(div);
    }
    var isMine=m.from===me.username;
    var isSys=m.type==='system';
    var wrap=document.createElement('div');
    wrap.className='mw'+(isMine?' me':'');
    var time=new Date(m.timestamp).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    if(!isSys)wrap.innerHTML='<div class="mm"><span class="mu">'+m.from+'</span><span>'+time+'</span></div>';
    var b=document.createElement('div');
    b.className='bbl '+(isSys?'sy':isMine?'my':'ot')+(m.type==='sticker'?' stk':'')+(m.type==='emote'?' emt':'');
    if(m.color&&!isSys)b.style.color=m.color;
    if(m.bold)b.style.fontWeight='700';
    if(m.fontSize)b.style.fontSize=m.fontSize;
    if(m.italic)b.style.fontStyle='italic';
    b.textContent=m.content;
    wrap.appendChild(b);container.appendChild(wrap);
  });
  container.scrollTop=container.scrollHeight;
  var ub=document.getElementById('ub'),uc=document.getElementById('uc');
  if(ub&&uc){ub.style.display=unread>0?'flex':'none';if(unread>0)uc.textContent=unread;}
}

function markAllRead(){
  if(curRoom)unreadRooms[curRoom]=0;
  if(curDM)unreadDMs[curDM]=0;
  renderMessages();renderRoomList();renderDMList();
}

function sendMsg(){
  var inp=document.getElementById('mi');
  var content=inp.value.trim();if(!content)return;
  if(curRoom)socket.emit('message:room',{room:curRoom,content:content,type:'text',color:msgColor,bold:msgBold,italic:msgItalic,fontSize:msgFontSize});
  else if(curDM)socket.emit('message:dm',{to:curDM,content:content,type:'text',color:msgColor,bold:msgBold,italic:msgItalic,fontSize:msgFontSize});
  inp.value='';inp.style.height='auto';closeAllPanels();
}
function sendSticker(s){
  if(curRoom)socket.emit('message:room',{room:curRoom,content:s,type:'sticker'});
  else if(curDM)socket.emit('message:dm',{to:curDM,content:s,type:'sticker'});
  closeAllPanels();
}
function insertEmoji(e){var i=document.getElementById('mi');if(i){i.value+=e;i.focus();}closeAllPanels();}
function handleTyping(){
  var i=document.getElementById('mi');
  i.style.height='auto';i.style.height=Math.min(i.scrollHeight,100)+'px';
  if(curRoom)socket.emit('typing:room',{room:curRoom,isTyping:true});
  else if(curDM)socket.emit('typing:dm',{to:curDM,isTyping:true});
  clearTimeout(typTimers.m);
  typTimers.m=setTimeout(function(){
    if(curRoom)socket.emit('typing:room',{room:curRoom,isTyping:false});
    else if(curDM)socket.emit('typing:dm',{to:curDM,isTyping:false});
  },2000);
}

function renderUserList(){
  var el=document.getElementById('ul');el.innerHTML='';
  onlineUsers.filter(function(u){return u!==me.username;}).forEach(function(username){
    var d=document.createElement('div');d.className='ui';
    d.innerHTML='<span style="font-size:18px">😺</span><span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+username+'</span><div class="udot"></div>';
    d.onclick=function(){if(confirm('開啟與 '+username+' 的私訊？'))openDM(username);};
    el.appendChild(d);
  });
}

function toggleBold(){msgBold=!msgBold;document.getElementById('bbold').classList.toggle('on',msgBold);}
function toggleItal(){msgItalic=!msgItalic;document.getElementById('bital').classList.toggle('on',msgItalic);}
function setColor(c){
  msgColor=c;var d=document.getElementById('curdot');if(d)d.style.background=c;
  document.querySelectorAll('.csw').forEach(function(s){s.classList.toggle('on',s.dataset.c===c);});
  closeAllPanels();
}
function togglePanel(id){
  var t=document.getElementById(id);var was=t.classList.contains('on');
  closeAllPanels();if(!was)t.classList.add('on');
}
function closeAllPanels(){['ep','sp','cp'].forEach(function(id){document.getElementById(id).classList.remove('on');});}
document.addEventListener('click',function(e){
  if(!e.target.closest('.fp')&&!e.target.closest('#bcolor')&&!e.target.closest('#bemoji')&&!e.target.closest('#bsticker'))closeAllPanels();
});

function buildEPanel(){
  var g=document.getElementById('eg');g.innerHTML='';
  EMOJIS.forEach(function(e){var b=document.createElement('button');b.className='eb';b.textContent=e;b.onclick=function(){insertEmoji(e);};g.appendChild(b);});
}
function switchET(t,btn){
  document.querySelectorAll('#ep .itbtn').forEach(function(x){x.classList.remove('on');});btn.classList.add('on');
  var g=document.getElementById('eg');g.innerHTML='';
  (t==='e'?EMOJIS:KAOS).forEach(function(e){var b=document.createElement('button');b.className='eb';b.textContent=e;b.style.fontSize=t==='k'?'11px':'22px';b.onclick=function(){insertEmoji(e);};g.appendChild(b);});
}
function buildSPanel(){
  var g=document.getElementById('sg2');g.innerHTML='';
  STICKERS.forEach(function(s){var b=document.createElement('button');b.className='sb';b.textContent=s;b.onclick=function(){sendSticker(s);};g.appendChild(b);});
}
function buildCPanel(){
  var el=document.getElementById('cs');el.innerHTML='';
  COLORS.forEach(function(c){var d=document.createElement('div');d.className='csw';d.style.background=c;d.dataset.c=c;d.onclick=function(){setColor(c);};el.appendChild(d);});
}
function buildAvaGrid(){
  var g=document.getElementById('ag');g.innerHTML='';
  AVAS.forEach(function(a){
    var d=document.createElement('div');d.className='ao'+(a===(me.avatar||'😺')?' on':'');
    d.textContent=a;
    d.onclick=function(){document.querySelectorAll('.ao').forEach(function(x){x.classList.remove('on');});d.classList.add('on');selAva=a;};
    g.appendChild(d);
  });
}

function saveProfile(){
  var nickname=document.getElementById('pnick').value.trim();
  var status=document.getElementById('pstat').value;
  var statusMsg=document.getElementById('psmsg').value.trim();
  callApi('PUT','/api/me',{nickname:nickname,avatar:selAva,status:status,statusMsg:statusMsg}).then(function(r){
    me=Object.assign({},me,r);updateTopbar();
    socket.emit('user:status',{status:status,statusMsg:statusMsg});
    closeModal('mo-profile');showToast('✅ 個人資料已更新');
  });
}

function loadFriends(){
  callApi('GET','/api/friends').then(function(d){
    var re=document.getElementById('freq'),le=document.getElementById('flist');
    if(!re||!le)return;
    re.innerHTML=d.requests&&d.requests.length?d.requests.map(function(u){return '<div class="fi"><span style="font-size:18px">😺</span><span style="flex:1;font-size:13px">'+u+'</span><button class="bsm" onclick="acceptFriend(\''+u+'\')">✅ 接受</button></div>';}).join(''):'<div style="color:var(--txd);font-size:12px">暫無好友請求</div>';
    if(!d.friends||!d.friends.length){le.innerHTML='<div style="color:var(--txd);font-size:12px">還沒有好友，去搜尋新朋友吧！</div>';return;}
    var onl=d.friends.filter(function(u){return onlineUsers.indexOf(u)>=0;});
    var ofl=d.friends.filter(function(u){return onlineUsers.indexOf(u)<0;});
    var html='';
    if(onl.length)html+='<div style="font-size:10px;color:var(--grn);letter-spacing:1px;text-transform:uppercase;margin:8px 0 4px">線上 ('+onl.length+')</div>'+onl.map(function(u){return '<div class="fi"><span style="font-size:18px">😺</span><div style="flex:1"><div style="font-size:13px;font-weight:500">'+u+'</div></div><span style="font-size:10px;color:var(--grn);margin-right:6px">🟢 線上</span><button class="bsm" onclick="openDM(\''+u+'\');closeModal(\'mo-friends\')">💬 私訊</button></div>';}).join('');
    if(ofl.length)html+='<div style="font-size:10px;color:var(--txd);letter-spacing:1px;text-transform:uppercase;margin:8px 0 4px">離線 ('+ofl.length+')</div>'+ofl.map(function(u){return '<div class="fi"><span style="font-size:18px">😺</span><div style="flex:1"><div style="font-size:13px;font-weight:500">'+u+'</div></div><span style="font-size:10px;color:var(--txd);margin-right:6px">⚫ 離線</span><button class="bsm" onclick="openDM(\''+u+'\');closeModal(\'mo-friends\')">💬 私訊</button></div>';}).join('');
    le.innerHTML=html;
  });
}

function searchUsers(){
  var q=document.getElementById('fsrch').value.trim();
  if(!q){showToast('⚠️ 請輸入搜尋關鍵字');return;}
  var el=document.getElementById('fsr');
  el.innerHTML='<div style="color:var(--txd);font-size:12px">搜尋中...</div>';
  callApi('GET','/api/users/search?q='+encodeURIComponent(q)).then(function(users){
    if(!users||users.error){el.innerHTML='<div style="color:#ff6b6b;font-size:12px">搜尋失敗</div>';return;}
    var filtered=users.filter(function(u){return u.username!==me.username;});
    el.innerHTML=filtered.length?filtered.map(function(u){return '<div class="fi"><span style="font-size:18px">'+(u.avatar||'😺')+'</span><div style="flex:1"><div style="font-size:13px;font-weight:700">'+(u.nickname||u.username)+'</div><div style="font-size:11px;color:var(--txd)">@'+u.username+'</div></div><button class="bsm" onclick="addFriend(\''+u.username+'\')">➕ 加好友</button></div>';}).join(''):'<div style="color:var(--txd);font-size:12px">找不到「'+q+'」</div>';
  }).catch(function(){el.innerHTML='<div style="color:#ff6b6b;font-size:12px">搜尋失敗，請重試</div>';});
}

function addFriend(username){
  callApi('POST','/api/friends/request',{username:username}).then(function(r){
    if(r.error){showToast('❌ '+r.error);return;}
    showToast('✅ 已傳送好友邀請給 '+username);
  });
}

function acceptFriend(username){
  callApi('POST','/api/friends/accept',{username:username}).then(function(){
    showToast('✅ 已新增 '+username+' 為好友');loadFriends();
  });
}

function createRoom(){
  var name=document.getElementById('nrn').value.trim();
  var category=document.getElementById('nrc').value;
  var topic=document.getElementById('nrt').value.trim();
  if(!name){showToast('⚠️ 請輸入聊天室名稱');return;}
  callApi('POST','/api/rooms',{name:name,category:category,topic:topic}).then(function(r){
    if(r.error){showToast('❌ '+r.error);return;}
    closeModal('mo-room');joinRoom(name);
  });
}

function showToast(msg){
  var t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.remove();},3500);
}

if(token){
  callApi('GET','/api/me').then(function(r){
    if(!r.error){me=r;startApp();}
    else{localStorage.removeItem('yc_token');token=null;}
  });
}
</script>
</body>
</html>
